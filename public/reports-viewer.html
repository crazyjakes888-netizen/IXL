<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IXL-ELA</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111; color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh; padding: 0;
    }
    header {
      background: #1e1e1e; border-bottom: 2px solid #333;
      padding: 14px 24px; display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
    }
    header h1 { font-size: 1.15rem; color: #fff; }
    #refresh-btn {
      background: #333; border: 1px solid #555; color: #fff;
      border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 0.85rem;
    }
    #refresh-btn:hover { background: #444; }
    #status { font-size: 0.78rem; color: #888; }

    #tabs {
      display: flex; gap: 0; border-bottom: 2px solid #2a2a2a;
      background: #161616; padding: 0 20px;
    }
    .tab-btn {
      background: none; border: none; color: #888; cursor: pointer;
      padding: 12px 20px; font-size: 0.88rem; border-bottom: 3px solid transparent;
      transition: color 0.15s; white-space: nowrap;
    }
    .tab-btn:hover { color: #ddd; }
    .tab-btn.active { color: #fff; border-bottom-color: #5588ff; }
    .tab-btn .badge {
      background: #c0392b; color: #fff; border-radius: 10px;
      padding: 1px 7px; font-size: 0.7rem; margin-left: 6px; vertical-align: middle;
    }

    #container { padding: 20px 24px; max-width: 900px; }

    #empty-msg { color: #666; text-align: center; padding: 40px; font-size: 0.95rem; }

    .report-card {
      background: #1a1a1a; border: 1px solid #2e2e2e;
      border-radius: 8px; padding: 14px 16px; margin-bottom: 12px;
      position: relative; transition: border-color 0.2s;
    }
    .report-card.unread { border-left: 3px solid #5588ff; }
    .report-card.read { opacity: 0.65; }

    .card-top {
      display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap;
    }
    .badge-type {
      font-size: 0.72rem; font-weight: bold; padding: 2px 9px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .badge-type.player { background: #5c1a1a; color: #ff8888; }
    .badge-type.bug { background: #1a3c1a; color: #88ee88; }
    .badge-type.suggestion { background: #1a2c4a; color: #88aaff; }

    .card-from { font-size: 0.82rem; color: #aaa; }
    .card-from strong { color: #ddd; }
    .card-target { font-size: 0.82rem; color: #ffaa55; }
    .card-time { font-size: 0.75rem; color: #666; margin-left: auto; }

    .card-text {
      font-size: 0.9rem; color: #ccc; line-height: 1.5;
      white-space: pre-wrap; word-break: break-word;
      background: #111; border-radius: 5px; padding: 10px 12px; margin-top: 6px;
    }

    .card-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-read, .btn-delete {
      border: none; border-radius: 6px; padding: 5px 14px;
      font-size: 0.78rem; cursor: pointer;
    }
    .btn-read { background: #2a3a5a; color: #aabbff; }
    .btn-read:hover { background: #3a4a6a; }
    .btn-delete { background: #3a1a1a; color: #ff8888; }
    .btn-delete:hover { background: #5a2a2a; }

    #error-msg {
      color: #ff6666; text-align: center; padding: 40px;
      font-size: 0.95rem; display: none;
    }
  </style>
</head>
<body>
<header>
  <h1>📋 Reports Viewer</h1>
  <div style="display:flex;gap:12px;align-items:center;">
    <span id="status">Loading...</span>
    <button id="refresh-btn">↻ Refresh</button>
  </div>
</header>

<div id="tabs">
  <button class="tab-btn active" data-filter="all">All <span class="badge" id="badge-all"></span></button>
  <button class="tab-btn" data-filter="player">🚨 Player <span class="badge" id="badge-player"></span></button>
  <button class="tab-btn" data-filter="bug">🐛 Bug <span class="badge" id="badge-bug"></span></button>
  <button class="tab-btn" data-filter="suggestion">💡 Suggestion <span class="badge" id="badge-suggestion"></span></button>
  <button class="tab-btn" data-filter="joinlog">👥 Players</button>
</div>

<div id="container">
  <div id="error-msg">⛔ Access denied or session expired. Please use <code>/reports</code> in the admin console to get a fresh link.</div>
  <div id="empty-msg" style="display:none;">No reports yet.</div>
  <div id="report-list"></div>
  <div id="joinlog-panel" style="display:none;">
    <div id="jl-search-row" style="padding:0 0 14px;">
      <input id="jl-search" type="text" placeholder="Search name..." style="width:100%;max-width:320px;padding:7px 10px;background:#111;border:1px solid #444;border-radius:6px;color:#e0e0e0;font-size:0.85rem;" />
    </div>
    <div id="jl-list"></div>
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const token = params.get('token') || '';
  let allReports = [];
  let allJoinLog = [];
  let currentFilter = 'all';

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function unreadCount(type) {
    return allReports.filter(r => !r.read && (type === 'all' || r.type === type)).length;
  }

  function updateBadges() {
    ['all','player','bug','suggestion'].forEach(t => {
      const el = document.getElementById('badge-' + t);
      const n = unreadCount(t);
      el.textContent = n || '';
      el.style.display = n ? '' : 'none';
    });
  }

  function render() {
    const isJoinlog = currentFilter === 'joinlog';
    document.getElementById('report-list').style.display   = isJoinlog ? 'none' : '';
    document.getElementById('joinlog-panel').style.display = isJoinlog ? '' : 'none';
    if (isJoinlog) { renderJoinLog(); return; }

    const list = document.getElementById('report-list');
    list.innerHTML = '';
    const filtered = currentFilter === 'all' ? allReports : allReports.filter(r => r.type === currentFilter);
    document.getElementById('empty-msg').style.display = filtered.length === 0 ? '' : 'none';
    filtered.forEach(r => {
      const card = document.createElement('div');
      card.className = 'report-card ' + (r.read ? 'read' : 'unread');
      card.id = 'card-' + r.id;
      const typeLabels = { player: '🚨 Player', bug: '🐛 Bug', suggestion: '💡 Suggestion' };
      card.innerHTML = `
        <div class="card-top">
          <span class="badge-type ${r.type}">${typeLabels[r.type] || r.type}</span>
          <span class="card-from">From: <strong>${esc(r.from)}</strong></span>
          ${r.target ? `<span class="card-target">→ ${esc(r.target)}</span>` : ''}
          <span class="card-time">${formatTime(r.time)}</span>
        </div>
        <div class="card-text">${esc(r.text)}</div>
        <div class="card-actions">
          <button class="btn-read" data-id="${r.id}">${r.read ? '↩ Mark Unread' : '✓ Mark Read'}</button>
          <button class="btn-delete" data-id="${r.id}">🗑 Delete</button>
        </div>
      `;
      list.appendChild(card);
    });

    list.querySelectorAll('.btn-read').forEach(btn => {
      btn.addEventListener('click', () => toggleRead(Number(btn.dataset.id)));
    });
    list.querySelectorAll('.btn-delete').forEach(btn => {
      btn.addEventListener('click', () => deleteReport(Number(btn.dataset.id)));
    });
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderJoinLog(q) {
    const search = (q !== undefined ? q : document.getElementById('jl-search').value).toLowerCase();
    const entries = search ? allJoinLog.filter(e => e.name.toLowerCase().includes(search)) : allJoinLog;
    const el = document.getElementById('jl-list');
    el.innerHTML = '';
    if (!entries.length) { el.innerHTML = '<div style="color:#666;padding:20px 0;">No players found.</div>'; return; }
    entries.forEach(e => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid #222;font-size:0.85rem;flex-wrap:wrap;';
      row.innerHTML = `
        <span style="color:#fff;font-weight:bold;min-width:140px;">${esc(e.name)}</span>
        <span style="color:#888;">First seen: ${formatTime(e.firstSeen)}</span>
        <span style="color:#888;">Last seen: ${formatTime(e.lastSeen)}</span>
        <span style="color:#aaa;">Joins: ${e.joinCount || 1}</span>
      `;
      el.appendChild(row);
    });
  }

  document.getElementById('jl-search').addEventListener('input', e => renderJoinLog(e.target.value));

  async function loadReports() {
    try {
      const [rRes, jRes] = await Promise.all([
        fetch('/api/reports?token='  + encodeURIComponent(token)),
        fetch('/api/joinlog?token=' + encodeURIComponent(token))
      ]);
      if (rRes.status === 401) {
        document.getElementById('error-msg').style.display = '';
        document.getElementById('report-list').innerHTML = '';
        document.getElementById('status').textContent = 'Access denied';
        return;
      }
      document.getElementById('error-msg').style.display = 'none';
      allReports = await rRes.json();
      if (jRes.ok) allJoinLog = await jRes.json();
      updateBadges();
      render();
      document.getElementById('status').textContent = `${allReports.length} report${allReports.length !== 1 ? 's' : ''} · ${allJoinLog.length} players · refreshed ${new Date().toLocaleTimeString()}`;
    } catch(e) {
      document.getElementById('status').textContent = 'Error loading reports';
    }
  }

  async function toggleRead(id) {
    const res = await fetch('/api/reports/' + id + '/read?token=' + encodeURIComponent(token), { method: 'PATCH' });
    if (res.ok) {
      const r = allReports.find(r => r.id === id);
      if (r) r.read = !r.read;
      updateBadges();
      render();
    }
  }

  async function deleteReport(id) {
    const res = await fetch('/api/reports/' + id + '?token=' + encodeURIComponent(token), { method: 'DELETE' });
    if (res.ok) {
      allReports = allReports.filter(r => r.id !== id);
      updateBadges();
      render();
    }
  }

  document.getElementById('refresh-btn').addEventListener('click', loadReports);

  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentFilter = btn.dataset.filter;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
      render();
    });
  });

  loadReports();
  // Auto-refresh every 30 seconds
  setInterval(loadReports, 30000);
</script>
</body>
</html>
