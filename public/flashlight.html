<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashlight</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 40px;
      transition: background 0.3s ease;
    }

    body.off {
      background: #111;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    body:hover .controls,
    body.off .controls {
      opacity: 1;
    }

    .toggle-btn {
      background: rgba(0, 0, 0, 0.15);
      border: 2px solid rgba(0, 0, 0, 0.25);
      color: #333;
      font-size: 16px;
      font-family: sans-serif;
      padding: 10px 28px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s;
    }

    body.off .toggle-btn {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
      color: #eee;
    }

    .toggle-btn:hover {
      background: rgba(0, 0, 0, 0.25);
    }

    body.off .toggle-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    label {
      font-family: sans-serif;
      font-size: 14px;
      color: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    body.off label {
      color: rgba(255, 255, 255, 0.4);
    }

    input[type="range"] {
      width: 180px;
      accent-color: #555;
      cursor: pointer;
    }
  </style>
</head>
<body id="screen">

  <div class="controls">
    <label>
      Brightness
      <input type="range" id="brightness" min="10" max="100" value="100" />
    </label>
    <button class="toggle-btn" id="toggleBtn" onclick="toggleLight()">Turn Off</button>
  </div>

  <script>
    const screen = document.getElementById('screen');
    const btn = document.getElementById('toggleBtn');
    const slider = document.getElementById('brightness');
    let isOn = true;

    function toggleLight() {
      isOn = !isOn;
      screen.classList.toggle('off', !isOn);
      btn.textContent = isOn ? 'Turn Off' : 'Turn On';
      if (isOn) applyBrightness(slider.value);
    }

    function applyBrightness(val) {
      const lightness = Math.round((val / 100) * 255);
      const hex = lightness.toString(16).padStart(2, '0');
      screen.style.background = `#${hex}${hex}${hex}`;
    }

    slider.addEventListener('input', () => {
      if (isOn) applyBrightness(slider.value);
    });

    // Request fullscreen on click anywhere except controls
    screen.addEventListener('click', (e) => {
      if (!e.target.closest('.controls')) {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        }
      }
    });
  </script>
</body>
</html>
