<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IXL math</title>
  <link rel="icon" href="https://www.ixl.com/favicon.ico" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111111;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #1e1e1e;
      padding: 10px 20px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffffff;
      border-bottom: 2px solid #333;
      letter-spacing: 2px;
    }

    header { position: relative; }
    #admin-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #admin-btn:hover { background: #444; }

    /* Attacks */
    #attacks-title {
      font-size: 1rem; color: #aaaaaa;
      text-transform: uppercase; letter-spacing: 1px; margin-top: 8px;
    }
    #attack-target-row {
      display: flex; align-items: center; gap: 8px; width: 100%; max-width: 420px;
    }
    #attack-target {
      flex: 1; padding: 5px 8px; border-radius: 6px;
      border: 1px solid #333; background: #1e1e1e; color: #e0e0e0;
      font-size: 0.85rem; outline: none;
    }
    #attacks {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px; width: 100%;
    }
    .attack-btn {
      background: #1e1e1e; border: 1px solid #552222;
      border-radius: 8px; padding: 8px 10px; cursor: pointer;
      color: #e0e0e0; text-align: left;
      transition: border-color 0.2s, background 0.2s;
    }
    .attack-btn:hover:not(:disabled) { border-color: #ff4444; background: #2a1515; }
    .attack-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .attack-btn .atk-name { font-weight: bold; font-size: 0.8rem; }
    .attack-btn .atk-desc { font-size: 0.7rem; color: #ff9999; margin-top: 2px; }
    .attack-btn .atk-cost { font-size: 0.75rem; color: #ffaaaa; margin-top: 3px; }

    /* Debuffs */
    #debuffs-display {
      display: flex; flex-wrap: wrap; gap: 6px;
      max-width: 420px; min-height: 0;
    }
    .debuff-chip {
      background: #2a1515; border: 1px solid #ff4444;
      border-radius: 20px; padding: 3px 10px;
      font-size: 0.75rem; color: #ff9999;
      animation: pulse-red 1s infinite alternate;
    }
    @keyframes pulse-red {
      from { border-color: #ff4444; }
      to   { border-color: #ff000088; }
    }

    /* Admin console */
    #admin-console {
      position: fixed;
      bottom: 40px;
      right: 20px;
      width: 420px;
      background: #0d0d0d;
      border: 1px solid #333;
      border-radius: 10px;
      z-index: 300;
      display: none;
      flex-direction: column;
      box-shadow: 0 8px 32px #000a;
      font-family: 'Consolas', 'Courier New', monospace;
    }
    #admin-console-titlebar {
      background: #1a1a1a;
      padding: 8px 14px;
      border-radius: 10px 10px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }
    #admin-console-titlebar span { color: #aaa; font-size: 0.85rem; }
    #admin-console-close {
      background: none; border: none; color: #888; cursor: pointer;
      font-size: 1rem; line-height: 1;
    }
    #admin-console-close:hover { color: #fff; }
    #admin-login-bar {
      padding: 12px;
      display: flex;
      gap: 8px;
    }
    #admin-pass {
      flex: 1; padding: 7px 10px; border-radius: 6px;
      border: 1px solid #333; background: #111; color: #eee;
      font-size: 0.85rem; outline: none; font-family: inherit;
    }
    #admin-submit {
      padding: 7px 14px; background: #333; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    }
    #admin-submit:hover { background: #444; }
    #admin-output {
      height: 200px; overflow-y: auto; padding: 10px 14px;
      font-size: 0.8rem; line-height: 1.6; display: none;
    }
    #admin-output::-webkit-scrollbar { width: 4px; }
    #admin-output::-webkit-scrollbar-thumb { background: #333; }
    .alog-info  { color: #aaaaaa; }
    .alog-ok    { color: #44ff88; }
    .alog-err   { color: #ff5555; }
    .alog-warn  { color: #ffcc44; }
    #admin-cmd-bar {
      display: none;
      padding: 8px 14px;
      border-top: 1px solid #222;
      align-items: center;
      gap: 6px;
    }
    #admin-cmd-bar span { color: #555; font-size: 0.85rem; }
    #admin-cmd {
      flex: 1; background: none; border: none; color: #00ff88;
      font-size: 0.85rem; outline: none; font-family: inherit;
    }
    #admin-error { color: #ff5555; font-size: 0.8rem; padding: 0 14px 10px; display:none; }


    #join-screen {
      position: fixed;
      inset: 0;
      background: #111111dd;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #join-box {
      background: #1e1e1e;
      border: 2px solid #444;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      min-width: 300px;
    }

    #join-box h2 { color: #ffffff; margin-bottom: 20px; font-size: 1.5rem; }

    #join-box input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #e0e0e0;
      font-size: 1rem;
      margin-bottom: 14px;
      outline: none;
    }

    #join-box button {
      width: 100%;
      padding: 12px;
      background: #444;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 8px;
    }

    #join-box button:hover { background: #555; }
    #join-box button:last-of-type { margin-bottom: 0; }
    #auth-error { color: #ff5555; font-size: 0.85rem; margin-top: 10px; min-height: 18px; }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* === GAME PANEL === */
    #game-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 16px;
      overflow-y: auto;
      gap: 8px;
    }

    #cookie-count {
      font-size: 1.4rem;
      color: #ffffff;
      font-weight: bold;
    }

    #cps-display { color: #aaaaaa; font-size: 0.85rem; }

    #cookie-btn {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid #555;
      background: radial-gradient(circle at 40% 35%, #c87820, #7a3b00);
      cursor: pointer;
      font-size: 3rem;
      user-select: none;
      transition: transform 0.08s, box-shadow 0.08s;
      box-shadow: 0 0 20px #33333355;
    }

    #cookie-btn:active {
      transform: scale(0.93);
    }

    #upgrades-title {
      font-size: 0.8rem;
      color: #aaaaaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      align-self: flex-start;
    }

    #upgrades {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
    }

    .upgrade-btn {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 10px;
      cursor: pointer;
      color: #e0e0e0;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
    }

    .upgrade-btn:hover:not(:disabled) {
      border-color: #666;
      background: #2a2a2a;
    }

    .upgrade-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .upgrade-btn .upg-name { font-weight: bold; font-size: 0.8rem; }
    .upgrade-btn .upg-desc { font-size: 0.7rem; color: #aaaaaa; margin-top: 2px; }
    .upgrade-btn .upg-cost { font-size: 0.75rem; color: #ffffff; margin-top: 3px; }
    .upgrade-btn .upg-owned { font-size: 0.65rem; color: #aaaaaa; }

    /* === RIGHT PANEL === */
    #right-panel {
      width: 270px;
      min-width: 270px;
      display: flex;
      flex-direction: column;
      border-left: 2px solid #2a2a2a;
      overflow: hidden;
    }

    /* Leaderboard */
    #leaderboard {
      background: #181818;
      padding: 12px;
      border-bottom: 2px solid #2a2a2a;
    }

    #leaderboard h3 {
      color: #ffffff;
      font-size: 0.9rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #lb-list { list-style: none; }
    #lb-list li {
      font-size: 0.8rem;
      padding: 3px 0;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a2a55;
    }

    #lb-list li .lb-name { color: #e0e0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
    #lb-list li .lb-score { color: #ffffff; white-space: nowrap; }
    #lb-list li.me .lb-name { color: #ffffff; font-weight: bold; }

    /* Chat */
    #chat-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-section h3 {
      padding: 10px 12px;
      font-size: 0.9rem;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: #1e1e1e;
      border-bottom: 1px solid #2a2a2a;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

    .chat-msg { font-size: 0.82rem; line-height: 1.4; word-break: break-word; }
    .chat-msg .chat-name { color: #aaaaff; font-weight: bold; }
    .chat-msg.system { color: #888888; font-style: italic; }

    #chat-input-row {
      display: flex;
      padding: 8px;
      gap: 6px;
      border-top: 1px solid #2a2a2a;
      background: #1e1e1e;
    }

    #chat-input {
      flex: 1;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #111111;
      color: #e0e0e0;
      font-size: 0.85rem;
      outline: none;
    }

    #chat-send {
      padding: 7px 12px;
      background: #444;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    #chat-send:hover { background: #555; }

    /* Click popups */
    .click-pop {
      position: fixed;
      pointer-events: none;
      font-size: 1.1rem;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 0 0 6px #44444488;
      animation: pop-up 0.8s ease-out forwards;
      z-index: 999;
    }

    @keyframes pop-up {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-50px) scale(1.4); }
    }
  </style>
</head>
<body>

<div id="join-screen">
  <div id="join-box">
    <h2>🍪 Cookie Chat</h2>
    <input id="auth-username" type="text" placeholder="Username..." maxlength="50" autocomplete="username" />
    <input id="auth-password" type="password" placeholder="Password..." maxlength="50" autocomplete="current-password" />
    <button id="login-btn">Login</button>
    <button id="register-btn" style="background:#333;">Register New Account</button>
    <div id="auth-error"></div>
  </div>
</div>

<header>
  🍪 COOKIE CHAT &nbsp;|&nbsp; <span id="name-display" style="color:#aaa;font-size:0.9rem;"></span>
  <button id="admin-btn" title="Admin Panel">🔑 Admin</button>
</header>

<!-- Admin Console -->
<div id="admin-console">
  <div id="admin-console-titlebar">
    <span>🛡️ Admin Console</span>
    <button id="admin-console-close">✕</button>
  </div>
  <div id="admin-login-bar">
    <input id="admin-pass" type="password" placeholder="Enter password..." />
    <button id="admin-submit">Login</button>
  </div>
  <div id="admin-error"></div>
  <div id="admin-output"></div>
  <div id="admin-cmd-bar">
    <span>&gt;</span>
    <input id="admin-cmd" type="text" placeholder="type a command..." autocomplete="off" spellcheck="false" />
  </div>
</div>

<div id="main">
  <div id="game-panel">
    <div id="cookie-count">0 cookies</div>
    <div id="cps-display">0 cookies/sec</div>
    <button id="cookie-btn" title="Click me!">🍪</button>
    <div id="upgrades-title">Upgrades</div>
    <div id="upgrades"></div>
    <div id="debuffs-display"></div>
    <div id="attacks-title">⚔️ Attacks</div>
    <div id="attack-target-row">
      <span style="color:#aaa;font-size:0.8rem;">Target:</span>
      <select id="attack-target"><option value="">— pick player —</option></select>
    </div>
    <div id="attacks"></div>
  </div>

  <div id="right-panel">
    <div id="leaderboard">
      <h3>🏆 Leaderboard</h3>
      <ul id="lb-list"></ul>
    </div>
    <div id="chat-section">
      <h3>💬 Chat</h3>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Say something..." maxlength="200" />
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ---- Game State ----
  let cookies = 0;
  let totalCps = 0;
  let myName = '';
  let socket;

  const UPGRADES = [
    { id: 'cursor',     name: '🖱️ Cursor',        desc: '+1 click',          baseCost: 15,       clickPower: 1,    cps: 0 },
    { id: 'grandma',    name: '👵 Grandma',        desc: '+1/sec',            baseCost: 100,      clickPower: 0,    cps: 1 },
    { id: 'farm',       name: '🌾 Farm',           desc: '+5/sec',            baseCost: 500,      clickPower: 0,    cps: 5 },
    { id: 'mine',       name: '⛏️ Mine',           desc: '+10/sec',           baseCost: 2000,     clickPower: 0,    cps: 10 },
    { id: 'factory',    name: '🏭 Factory',        desc: '+20/sec',           baseCost: 8000,     clickPower: 0,    cps: 20 },
    { id: 'bank',       name: '🏦 Bank',           desc: '+50/sec',           baseCost: 20000,    clickPower: 0,    cps: 50 },
    { id: 'temple',     name: '⛩️ Temple',         desc: '+100/sec',          baseCost: 75000,    clickPower: 0,    cps: 100 },
    { id: 'wizard',     name: '🧙 Wizard',         desc: '+200/sec',          baseCost: 200000,   clickPower: 0,    cps: 200 },
    { id: 'shipment',   name: '🚀 Shipment',       desc: '+500/sec',          baseCost: 500000,   clickPower: 0,    cps: 500 },
    { id: 'alchemy',    name: '⚗️ Alchemy',        desc: '+1K/sec',           baseCost: 1500000,  clickPower: 0,    cps: 1000 },
    { id: 'portal',     name: '🌀 Portal',         desc: '+5K/sec',           baseCost: 5000000,  clickPower: 0,    cps: 5000 },
    { id: 'timemachine',name: '⏰ Time Machine',   desc: '+10K/sec',          baseCost: 15000000, clickPower: 0,    cps: 10000 },
    { id: 'antimatter', name: '⚛️ Antimatter',     desc: '+50K/sec',          baseCost: 75000000, clickPower: 0,    cps: 50000 },
    { id: 'prism',      name: '🔮 Prism',          desc: '+200K/sec',         baseCost: 3e8,      clickPower: 0,    cps: 200000 },
    { id: 'chancemaker',name: '🎲 Chancemaker',    desc: '+1M/sec',           baseCost: 1e9,      clickPower: 0,    cps: 1000000 },
    { id: 'fractal',    name: '🌌 Fractal Engine', desc: '+5M/sec',           baseCost: 5e9,      clickPower: 0,    cps: 5000000 },
    { id: 'megaclick',  name: '👆 Mega Click',     desc: '+10 click',         baseCost: 50000,    clickPower: 10,   cps: 0 },
    { id: 'ultraclick', name: '⚡ Ultra Click',    desc: '+50 click',         baseCost: 500000,   clickPower: 50,   cps: 0 },
    { id: 'godclick',   name: '✨ God Click',      desc: '+200 click',        baseCost: 5000000,  clickPower: 200,  cps: 0 },
    { id: 'omnclick',   name: '💥 Omni Click',     desc: '+1000 click',       baseCost: 50000000, clickPower: 1000, cps: 0 },
  ];

  const ATTACKS = [
    { id: 'freeze',    name: '❄️ Freeze',        desc: 'Stop CPS for 12s',       cost: 2000    },
    { id: 'curse',     name: '☠️ Curse',         desc: '-20/sec for 20s',        cost: 15000   },
    { id: 'virus',     name: '🦠 Cookie Virus',  desc: 'Halve CPS for 25s',      cost: 30000   },
    { id: 'drain',     name: '🕳️ Drain',         desc: '-100/sec for 15s',       cost: 50000   },
    { id: 'timetheft', name: '⏳ Time Theft',    desc: 'Reverse CPS for 30s',    cost: 200000  },
    { id: 'confuse',   name: '😵 Confuse',       desc: 'Lose 3 random upgrades', cost: 100000  },
  ];

  const activeDebuffs = {}; // { type: clearTimeout }

  const owned = {};
  UPGRADES.forEach(u => owned[u.id] = 0);

  function getCost(upg) {
    return Math.floor(upg.baseCost * Math.pow(1.15, owned[upg.id]));
  }

  function getClickPower() {
    return 1 + UPGRADES.filter(u => u.clickPower > 0).reduce((acc, u) => acc + u.clickPower * owned[u.id], 0);
  }

  function recalcCps() {
    totalCps = UPGRADES.filter(u => u.cps > 0).reduce((acc, u) => acc + u.cps * owned[u.id], 0);
  }

  function formatNum(n) {
    if (n >= 1e12) return (n / 1e12).toFixed(1) + 'T';
    if (n >= 1e9)  return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6)  return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3)  return (n / 1e3).toFixed(1) + 'K';
    return Math.floor(n).toString();
  }

  // ---- UI ----
  function renderUpgrades() {
    const container = document.getElementById('upgrades');
    container.innerHTML = '';
    UPGRADES.forEach(upg => {
      const cost = getCost(upg);
      const btn = document.createElement('button');
      btn.className = 'upgrade-btn';
      btn.disabled = cookies < cost;
      btn.innerHTML = `
        <div class="upg-name">${upg.name}</div>
        <div class="upg-desc">${upg.desc}</div>
        <div class="upg-cost">🍪 ${formatNum(cost)}</div>
        <div class="upg-owned">owned: ${owned[upg.id]}</div>
      `;
      btn.addEventListener('click', () => {
        if (cookies >= cost) {
          cookies -= cost;
          owned[upg.id]++;
          recalcCps();
          renderUpgrades();
          updateDisplay();
        }
      });
      container.appendChild(btn);
    });
  }

  function renderAttacks() {
    const container = document.getElementById('attacks');
    container.innerHTML = '';
    ATTACKS.forEach(atk => {
      const btn = document.createElement('button');
      btn.className = 'attack-btn';
      btn.disabled = cookies < atk.cost;
      btn.innerHTML = `
        <div class="atk-name">${atk.name}</div>
        <div class="atk-desc">${atk.desc}</div>
        <div class="atk-cost">🍪 ${formatNum(atk.cost)}</div>
      `;
      btn.addEventListener('click', () => {
        const target = document.getElementById('attack-target').value;
        if (!target) { alert('Pick a target first!'); return; }
        if (target === myName) { alert("You can't attack yourself!"); return; }
        if (cookies >= atk.cost && socket) {
          cookies -= atk.cost;
          socket.emit('attack', { attackId: atk.id, targetName: target });
          updateDisplay();
          renderAttacks();
        }
      });
      container.appendChild(btn);
    });
  }

  function updateTargetList(players) {
    const sel = document.getElementById('attack-target');
    const current = sel.value;
    sel.innerHTML = '<option value="">— pick player —</option>';
    players.forEach(p => {
      if (p.name !== myName) {
        const opt = document.createElement('option');
        opt.value = p.name;
        opt.textContent = p.name;
        if (p.name === current) opt.selected = true;
        sel.appendChild(opt);
      }
    });
  }

  function applyDebuff(type, duration, label) {
    if (activeDebuffs[type]) clearTimeout(activeDebuffs[type].timer);
    const display = document.getElementById('debuffs-display');
    let chip = document.getElementById('debuff-' + type);
    if (!chip) {
      chip = document.createElement('div');
      chip.className = 'debuff-chip';
      chip.id = 'debuff-' + type;
      display.appendChild(chip);
    }
    chip.textContent = label;
    activeDebuffs[type] = {
      timer: setTimeout(() => {
        chip.remove();
        delete activeDebuffs[type];
      }, duration)
    };
  }

  function updateDisplay() {
    document.getElementById('cookie-count').textContent = formatNum(cookies) + ' cookies';
    document.getElementById('cps-display').textContent = formatNum(totalCps) + ' cookies/sec';
  }

  // ---- Auto-clicker detection ----
  const clickTimes = [];
  let acFlagged = false;
  let acFlagStart = null;

  function checkAutoClicker() {
    const now = Date.now();
    // Keep only clicks in the last 5 seconds
    while (clickTimes.length && now - clickTimes[0] > 5000) clickTimes.shift();
    const count = clickTimes.length;
    const cps = count / 5;
    if (count < 10) return; // not enough data
    // Calc interval variance
    const intervals = [];
    for (let i = 1; i < clickTimes.length; i++) intervals.push(clickTimes[i] - clickTimes[i-1]);
    const avg = intervals.reduce((a,b) => a+b, 0) / intervals.length;
    const variance = intervals.reduce((a,b) => a + Math.pow(b-avg,2), 0) / intervals.length;
    const stdDev = Math.sqrt(variance);
    // Suspicious: >12 CPS with very regular timing (stdDev < 15ms) OR >20 CPS sustained
    const suspicious = (cps >= 12 && stdDev < 15) || cps >= 20;
    if (suspicious && !acFlagged) {
      acFlagged = true;
      acFlagStart = now;
      if (socket && myName) {
        socket.emit('autoclicker_report', { cps: cps.toFixed(1), stdDev: stdDev.toFixed(1) });
      }
    } else if (!suspicious && acFlagged) {
      const duration = ((now - acFlagStart) / 1000).toFixed(0);
      if (socket && myName) {
        socket.emit('autoclicker_report', { cps: cps.toFixed(1), stdDev: stdDev.toFixed(1), ended: true, duration });
      }
      acFlagged = false;
      acFlagStart = null;
    }
  }
  setInterval(checkAutoClicker, 1000);

  // ---- Cookie click ----
  document.getElementById('cookie-btn').addEventListener('click', (e) => {
    clickTimes.push(Date.now());
    const power = getClickPower();
    cookies += power;
    updateDisplay();
    renderUpgrades();

    // Pop animation
    const pop = document.createElement('div');
    pop.className = 'click-pop';
    pop.textContent = '+' + formatNum(power);
    pop.style.left = (e.clientX - 15) + 'px';
    pop.style.top  = (e.clientY - 10) + 'px';
    document.body.appendChild(pop);
    setTimeout(() => pop.remove(), 800);
  });

  // ---- Game loop ----
  let drainAmount = 0; // active curse drain per tick
  setInterval(() => {
    let gained = totalCps / 20;
    if (drainAmount > 0) gained -= drainAmount / 20;
    if (gained !== 0) {
      cookies = Math.max(0, cookies + gained);
      updateDisplay();
      renderUpgrades();
      renderAttacks();
    } else if (totalCps > 0) {
      updateDisplay();
      renderUpgrades();
      renderAttacks();
    }
    if (socket && myName) {
      socket.emit('update_score', { cookies: Math.floor(cookies), cps: totalCps });
    }
  }, 50);

  // Save progress to server every 5 seconds
  setInterval(() => {
    if (socket && myName) {
      socket.emit('save_progress', { cookies: Math.floor(cookies), owned });
    }
  }, 5000);

  // ---- Join ----
  function startGame(name, existingSocket) {
    myName = name;
    document.getElementById('join-screen').style.display = 'none';
    socket = existingSocket;

    renderUpgrades();
    renderAttacks();
    updateDisplay();

    socket.emit('join', name);
    document.getElementById('name-display').textContent = name;

    socket.on('connect', () => {
      socket.emit('join', name);
      document.getElementById('name-display').textContent = name;
    });

    socket.on('leaderboard', (lb) => {
      const list = document.getElementById('lb-list');
      list.innerHTML = '';
      lb.forEach((p, i) => {
        const li = document.createElement('li');
        if (p.name === myName) li.classList.add('me');
        li.innerHTML = `
          <span class="lb-name">${i + 1}. ${p.name}</span>
          <span class="lb-score">${formatNum(p.cookies)}</span>
        `;
        list.appendChild(li);
      });
      updateTargetList(lb);
    });

    socket.on('chat_cooldown', (secs) => {
      const input = document.getElementById('chat-input');
      input.placeholder = secs === 'muted' ? 'You are muted.' : `Wait ${secs}s...`;
      if (secs !== 'muted') setTimeout(() => { input.placeholder = 'Say something...'; }, secs * 1000);
    });

    socket.on('chat', ({ system, name, msg, time }) => {
      const msgs = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-msg' + (system ? ' system' : '');
      if (system) {
        div.textContent = msg;
      } else {
        div.innerHTML = `<span class="chat-name">${name}:</span> ${msg}`;
      }
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    });

    socket.on('chat_clear', () => {
      document.getElementById('chat-messages').innerHTML = '';
    });

    socket.on('banned', (info) => {
      document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#111;color:#ff5555;font-family:monospace;font-size:1.2rem;flex-direction:column;gap:12px;">
        <div style="font-size:3rem">🔨</div>
        <div>You have been banned.</div>
        <div style="color:#888;font-size:0.9rem">${info === 'permanent' ? 'This ban is permanent.' : 'Duration: ' + info}</div>
      </div>`;
    });

    // Attack received
    socket.on('attack_hit', ({ attackId, attackerName }) => {
      if (attackId === 'freeze') {
        const prev = totalCps;
        totalCps = 0;
        applyDebuff('freeze', 12000, '❄️ Frozen! CPS=0');
        setTimeout(() => { totalCps = prev; }, 12000);
      } else if (attackId === 'curse') {
        drainAmount = 20;
        applyDebuff('curse', 20000, '☠️ Cursed! -20/sec');
        setTimeout(() => { drainAmount = 0; }, 20000);
      } else if (attackId === 'virus') {
        const prev = totalCps;
        totalCps = Math.floor(prev / 2);
        applyDebuff('virus', 25000, '🦠 Virus! CPS halved');
        setTimeout(() => { totalCps = prev; }, 25000);
      } else if (attackId === 'drain') {
        drainAmount = (drainAmount || 0) + 100;
        applyDebuff('drain', 15000, '🕳️ Drained! -100/sec');
        setTimeout(() => { drainAmount = Math.max(0, drainAmount - 100); }, 15000);
      } else if (attackId === 'timetheft') {
        const prev = totalCps;
        totalCps = -prev;
        applyDebuff('timetheft', 30000, '⏳ Time Theft! CPS reversed');
        setTimeout(() => { totalCps = prev; }, 30000);
      } else if (attackId === 'confuse') {
        const ids = Object.keys(owned).filter(k => owned[k] > 0);
        for (let i = 0; i < Math.min(3, ids.length); i++) {
          const pick = ids.splice(Math.floor(Math.random() * ids.length), 1)[0];
          owned[pick] = Math.max(0, owned[pick] - 1);
        }
        recalcCps();
        renderUpgrades();
        applyDebuff('confuse', 3000, '😵 Confused! Lost 3 upgrades');
      }
      updateDisplay();
      // Show in chat
      const msgs = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-msg system';
      div.textContent = `⚔️ ${attackerName} attacked you with ${attackId}!`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    });

    socket.on('admin_reset_you', () => {
      cookies = 0; totalCps = 0;
      Object.keys(owned).forEach(k => owned[k] = 0);
      recalcCps(); updateDisplay(); renderUpgrades();
    });

    socket.on('admin_result', ({ success }) => {
      if (success) {
        document.getElementById('admin-login-bar').style.display = 'none';
        document.getElementById('admin-output').style.display = 'block';
        document.getElementById('admin-cmd-bar').style.display = 'flex';
        adminLog('Logged in. Type /help for commands.', 'alog-ok');
      } else {
        const err = document.getElementById('admin-error');
        err.style.display = 'block';
        err.textContent = 'Wrong password.';
      }
    });

    socket.on('admin_action_result', ({ ok, msg }) => {
      adminLog(msg, ok ? 'alog-ok' : 'alog-err');
    });

    socket.on('admin_playerlist', () => {});
  }


  // ---- Admin ----
  // ---- Admin Console ----
  function adminLog(msg, cls = 'alog-info') {
    const out = document.getElementById('admin-output');
    const line = document.createElement('div');
    line.className = cls;
    line.textContent = msg;
    out.appendChild(line);
    out.scrollTop = out.scrollHeight;
  }

  document.getElementById('admin-btn').addEventListener('click', () => {
    const c = document.getElementById('admin-console');
    c.style.display = c.style.display === 'flex' ? 'none' : 'flex';
  });

  document.getElementById('admin-console-close').addEventListener('click', () => {
    document.getElementById('admin-console').style.display = 'none';
  });

  document.getElementById('admin-submit').addEventListener('click', () => {
    const pass = document.getElementById('admin-pass').value;
    if (socket) socket.emit('admin_login', pass);
  });

  document.getElementById('admin-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('admin-submit').click();
  });

  const cmdHistory = [];
  let cmdHistoryIdx = -1;
  document.getElementById('admin-cmd').addEventListener('keydown', e => {
    if (e.key === 'ArrowUp') {
      if (cmdHistoryIdx < cmdHistory.length - 1) cmdHistoryIdx++;
      e.target.value = cmdHistory[cmdHistoryIdx] || '';
      return;
    }
    if (e.key === 'ArrowDown') {
      if (cmdHistoryIdx > 0) cmdHistoryIdx--;
      e.target.value = cmdHistory[cmdHistoryIdx] || '';
      return;
    }
    if (e.key !== 'Enter') return;
    const raw = e.target.value.trim();
    if (!raw) return;
    cmdHistory.unshift(raw); cmdHistoryIdx = -1;
    adminLog('> ' + raw, 'alog-info');
    e.target.value = '';

    const parts = raw.split(/\s+/);
    const cmd = parts[0].toLowerCase();

    if (cmd === '/help') {
      adminLog('/mute (name)          — permanent mute', 'alog-warn');
      adminLog('/unmute (name)        — remove mute', 'alog-warn');
      adminLog('/timeout (name) (sec) — temp mute', 'alog-warn');
      adminLog('/ban (name) (sec|perm)— ban', 'alog-warn');
      adminLog('/clear                — clear chat', 'alog-warn');
      return;
    }
    if (!socket) { adminLog('Not connected.', 'alog-err'); return; }

    if (cmd === '/mute') {
      if (!parts[1]) { adminLog('Usage: /mute (name)', 'alog-err'); return; }
      socket.emit('admin_mute', parts[1]);
    } else if (cmd === '/unmute') {
      if (!parts[1]) { adminLog('Usage: /unmute (name)', 'alog-err'); return; }
      socket.emit('admin_unmute', parts[1]);
    } else if (cmd === '/clear') {
      socket.emit('admin_clearchat');
    } else if (cmd === '/timeout') {
      if (!parts[1] || !parts[2]) { adminLog('Usage: /timeout (name) (seconds)', 'alog-err'); return; }
      socket.emit('admin_timeout', { name: parts[1], seconds: parseInt(parts[2]) });
    } else if (cmd === '/ban') {
      if (!parts[1] || !parts[2]) { adminLog('Usage: /ban (name) (seconds|perm)', 'alog-err'); return; }
      socket.emit('admin_ban', { name: parts[1], duration: parts[2] === 'perm' ? 'perm' : parseInt(parts[2]) });
    } else {
      adminLog('Unknown command. Type /help', 'alog-err');
    }
  });

  // ---- Auth ----
  const socket0 = io();

  function doAuth(isRegister) {
    const username = document.getElementById('auth-username').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl = document.getElementById('auth-error');
    if (!username) { errEl.textContent = 'Enter a username.'; return; }
    if (!password) { errEl.textContent = 'Enter a password.'; return; }
    errEl.textContent = '';
    socket0.emit('auth', { username, password, isRegister });
  }

  document.getElementById('login-btn').addEventListener('click', () => doAuth(false));
  document.getElementById('register-btn').addEventListener('click', () => doAuth(true));
  document.getElementById('auth-password').addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(false); });

  socket0.on('auth_result', ({ ok, msg, username, cookies: savedCookies, owned: savedOwned }) => {
    if (!ok) {
      document.getElementById('auth-error').textContent = msg;
      return;
    }
    cookies = savedCookies || 0;
    const so = savedOwned || {};
    Object.keys(so).forEach(k => { if (owned[k] !== undefined) owned[k] = so[k]; });
    recalcCps();
    startGame(username, socket0);
  });

  // ---- Chat send ----
  function sendChat() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (msg && socket) {
      socket.emit('chat_msg', msg);
      input.value = '';
    }
  }

  document.getElementById('chat-send').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendChat();
  });

  // ---- Init (before login) ----
  renderUpgrades();
  renderAttacks();
  updateDisplay();
</script>
</body>
</html>
