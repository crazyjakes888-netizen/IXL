<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IXL math</title>
  <link rel="icon" href="https://www.ixl.com/favicon.ico" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111111;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #1e1e1e;
      padding: 10px 120px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffffff;
      border-bottom: 2px solid #333;
      letter-spacing: 2px;
      position: relative;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #admin-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #admin-btn:hover { background: #444; }

    #lb-modal-btn {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #lb-modal-btn:hover { background: #444; }

    #lb-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000000bb;
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    #lb-modal-overlay.open { display: flex; }

    #lb-modal {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 10px;
      width: 420px;
      max-width: 95vw;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #lb-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      border-bottom: 1px solid #333;
      font-weight: bold;
      font-size: 1rem;
      color: #fff;
    }
    #lb-modal-close {
      background: none;
      border: none;
      color: #aaa;
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
    }
    #lb-modal-close:hover { color: #fff; }
    #lb-modal-body {
      overflow-y: auto;
      padding: 10px 18px;
    }
    #lb-modal-list { list-style: none; width: 100%; }
    #lb-modal-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid #2a2a2a;
      font-size: 0.9rem;
    }
    #lb-modal-list li:last-child { border-bottom: none; }
    #lb-modal-list .lbm-rank { color: #888; width: 28px; flex-shrink: 0; }
    #lb-modal-list .lbm-name { color: #e0e0e0; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #lb-modal-list .lbm-name.me { color: #fff; font-weight: bold; }
    #lb-modal-list .lbm-score { color: #fff; white-space: nowrap; margin-left: 10px; }

    /* Attacks */
    #attacks-title {
      font-size: 1rem; color: #aaaaaa;
      text-transform: uppercase; letter-spacing: 1px; margin-top: 8px;
    }
    #attack-target-row {
      display: flex; align-items: center; gap: 8px; width: 100%; max-width: 420px;
    }
    #attack-target {
      flex: 1; padding: 5px 8px; border-radius: 6px;
      border: 1px solid #333; background: #1e1e1e; color: #e0e0e0;
      font-size: 0.85rem; outline: none;
    }
    #attacks {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px; width: 100%;
    }
    .attack-btn {
      background: #1e1e1e; border: 1px solid #552222;
      border-radius: 8px; padding: 8px 10px; cursor: pointer;
      color: #e0e0e0; text-align: left;
      transition: border-color 0.2s, background 0.2s;
    }
    .attack-btn:hover:not(:disabled) { border-color: #ff4444; background: #2a1515; }
    .attack-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .attack-btn .atk-name { font-weight: bold; font-size: 0.8rem; }
    .attack-btn .atk-desc { font-size: 0.7rem; color: #ff9999; margin-top: 2px; }
    .attack-btn .atk-cost { font-size: 0.75rem; color: #ffaaaa; margin-top: 3px; }

    /* Attack error */
    #attack-error-msg {
      font-size: 0.8rem; color: #ff7777;
      min-height: 18px; text-align: center;
      animation: fadeout 3s forwards;
    }
    @keyframes fadeout {
      0%   { opacity: 1; }
      60%  { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Debuffs */
    #debuffs-display {
      display: flex; flex-wrap: wrap; gap: 6px;
      max-width: 420px; min-height: 0;
    }
    .debuff-chip {
      background: #2a1515; border: 1px solid #ff4444;
      border-radius: 20px; padding: 3px 10px;
      font-size: 0.75rem; color: #ff9999;
      animation: pulse-red 1s infinite alternate;
    }
    @keyframes pulse-red {
      from { border-color: #ff4444; }
      to   { border-color: #ff000088; }
    }

    /* Admin console */
    #admin-console {
      position: fixed;
      bottom: 40px;
      right: 20px;
      width: 420px;
      background: #0d0d0d;
      border: 1px solid #333;
      border-radius: 10px;
      z-index: 300;
      display: none;
      flex-direction: column;
      box-shadow: 0 8px 32px #000a;
      font-family: 'Consolas', 'Courier New', monospace;
    }
    #admin-console-titlebar {
      background: #1a1a1a;
      padding: 8px 14px;
      border-radius: 10px 10px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }
    #admin-console-titlebar span { color: #aaa; font-size: 0.85rem; }
    #admin-console-close {
      background: none; border: none; color: #888; cursor: pointer;
      font-size: 1rem; line-height: 1;
    }
    #admin-console-close:hover { color: #fff; }
    #admin-login-bar {
      padding: 12px;
      display: flex;
      gap: 8px;
    }
    #admin-pass {
      flex: 1; padding: 7px 10px; border-radius: 6px;
      border: 1px solid #333; background: #111; color: #eee;
      font-size: 0.85rem; outline: none; font-family: inherit;
    }
    #admin-submit {
      padding: 7px 14px; background: #333; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    }
    #admin-submit:hover { background: #444; }
    #admin-output {
      height: 200px; overflow-y: auto; padding: 10px 14px;
      font-size: 0.8rem; line-height: 1.6; display: none;
    }
    #admin-output::-webkit-scrollbar { width: 4px; }
    #admin-output::-webkit-scrollbar-thumb { background: #333; }
    .alog-info  { color: #aaaaaa; }
    .alog-ok    { color: #44ff88; }
    .alog-err   { color: #ff5555; }
    .alog-warn  { color: #ffcc44; }
    #admin-cmd-bar {
      display: none;
      padding: 8px 14px;
      border-top: 1px solid #222;
      align-items: center;
      gap: 6px;
    }
    #admin-cmd-bar span { color: #555; font-size: 0.85rem; }
    #admin-cmd {
      flex: 1; background: none; border: none; color: #00ff88;
      font-size: 0.85rem; outline: none; font-family: inherit;
    }
    #admin-error { color: #ff5555; font-size: 0.8rem; padding: 0 14px 10px; display:none; }


    #join-screen {
      position: fixed;
      inset: 0;
      background: #111111dd;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #join-box {
      background: #1e1e1e;
      border: 2px solid #444;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      min-width: 300px;
    }

    #join-box h2 { color: #ffffff; margin-bottom: 20px; font-size: 1.5rem; }

    #join-box input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #e0e0e0;
      font-size: 1rem;
      margin-bottom: 14px;
      outline: none;
    }

    #join-box button {
      width: 100%;
      padding: 12px;
      background: #444;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 8px;
    }

    #join-box button:hover { background: #555; }
    #join-box button:last-of-type { margin-bottom: 0; }
    #auth-error { color: #ff5555; font-size: 0.85rem; margin-top: 10px; min-height: 18px; }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* === GAME PANEL === */
    #game-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 16px;
      overflow-y: auto;
      gap: 8px;
    }

    #cookie-count {
      font-size: 1.4rem;
      color: #ffffff;
      font-weight: bold;
    }

    #cps-display { color: #aaaaaa; font-size: 0.85rem; }

    #cookie-btn {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 3px solid #555;
      background: radial-gradient(circle at 40% 35%, #c87820, #7a3b00);
      cursor: pointer;
      font-size: 3rem;
      user-select: none;
      transition: transform 0.08s, box-shadow 0.08s;
      box-shadow: 0 0 20px #33333355;
    }

    #cookie-btn:active {
      transform: scale(0.93);
    }

    #upgrades-title {
      font-size: 0.8rem;
      color: #aaaaaa;
      text-transform: uppercase;
      letter-spacing: 1px;
      align-self: flex-start;
    }

    #upgrades {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      width: 100%;
    }

    .upgrade-btn {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 10px;
      padding-right: 22px;
      cursor: pointer;
      color: #e0e0e0;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .upgrade-btn:hover:not(.disabled) {
      border-color: #666;
      background: #2a2a2a;
    }

    .upgrade-btn.disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .upgrade-btn .upg-name { font-weight: bold; font-size: 0.8rem; }
    .upgrade-btn .upg-desc { font-size: 0.7rem; color: #aaaaaa; margin-top: 2px; }
    .upgrade-btn .upg-cost { font-size: 0.75rem; color: #ffffff; margin-top: 3px; }
    .upgrade-btn .upg-owned { font-size: 0.65rem; color: #aaaaaa; }

    .upg-sell-btn {
      position: absolute;
      top: 3px; right: 3px;
      background: #1a1010;
      border: 1px solid #442222;
      color: #995555;
      border-radius: 3px;
      width: 16px; height: 16px;
      font-size: 0.6rem;
      cursor: pointer;
      padding: 0;
      display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    .upg-sell-btn:hover:not(:disabled) { background: #aa2222; color: #fff; border-color: #ff4444; }
    .upg-sell-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    /* Power-ups section */
    #powerups-title {
      font-size: 0.8rem; color: #ffcc44;
      text-transform: uppercase; letter-spacing: 1px;
    }
    #powerups {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px; width: 100%;
    }
    .powerup-btn {
      background: #1a1a10;
      border: 1px solid #554422;
      border-radius: 8px; padding: 8px 10px;
      cursor: pointer; color: #e0e0e0; text-align: left;
      transition: border-color 0.2s, background 0.2s;
    }
    .powerup-btn:hover:not(:disabled) { border-color: #ffcc44; background: #2a2a10; }
    .powerup-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .powerup-btn .pu-name { font-weight: bold; font-size: 0.8rem; color: #ffdd88; }
    .powerup-btn .pu-desc { font-size: 0.68rem; color: #ccaa66; margin-top: 2px; }
    .powerup-btn .pu-cost { font-size: 0.72rem; color: #fff; margin-top: 3px; }
    .powerup-btn .pu-timer { font-size: 0.68rem; color: #ffcc44; margin-top: 2px; font-weight: bold; min-height: 14px; }

    /* Pay modal */
    #pay-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: #000000bb; z-index: 2000;
      align-items: center; justify-content: center;
    }
    #pay-modal-overlay.open { display: flex; }
    #pay-modal {
      background: #1a1a1a; border: 1px solid #444;
      border-radius: 10px; width: 340px; max-width: 95vw;
      padding: 0; overflow: hidden;
    }
    #pay-modal-header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid #333;
      font-weight: bold; font-size: 1rem; color: #fff;
    }
    #pay-modal-close { background: none; border: none; color: #aaa; font-size: 1.2rem; cursor: pointer; }
    #pay-modal-close:hover { color: #fff; }
    #pay-modal-body { padding: 18px; display: flex; flex-direction: column; gap: 10px; }
    #pay-target, #pay-amount {
      width: 100%; padding: 8px 10px; border-radius: 6px;
      border: 1px solid #444; background: #111; color: #e0e0e0;
      font-size: 0.9rem; outline: none;
    }
    #pay-send-btn {
      padding: 10px; background: #2a5a2a; border: 1px solid #448844;
      color: #fff; border-radius: 6px; cursor: pointer;
      font-size: 0.9rem; font-weight: bold;
    }
    #pay-send-btn:hover { background: #336633; }
    #pay-result { font-size: 0.85rem; min-height: 18px; text-align: center; }

    /* Cookie + Pay row */
    #cookie-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    #pay-btn {
      position: absolute;
      left: calc(50% + 70px);
    }

    /* Pay button styles */
    #pay-btn {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #2a6a2a, #144414);
      border: 3px solid #448844;
      color: #88ff88;
      font-size: 1.6rem;
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      line-height: 1.2;
      transition: transform 0.08s, box-shadow 0.08s;
      box-shadow: 0 0 16px #00880033;
    }
    #pay-btn:hover { background: radial-gradient(circle at 40% 35%, #336633, #1a5a1a); transform: scale(1.05); }
    #pay-btn:active { transform: scale(0.93); }

    /* === RIGHT PANEL === */
    #right-panel {
      width: 270px;
      min-width: 270px;
      display: flex;
      flex-direction: column;
      border-left: 2px solid #2a2a2a;
      overflow: hidden;
    }

    /* Leaderboard */
    #leaderboard {
      background: #181818;
      padding: 12px;
      border-bottom: 2px solid #2a2a2a;
      overflow-y: auto;
      flex-shrink: 0;
      max-height: 50%;
    }

    #leaderboard h3 {
      color: #ffffff;
      font-size: 0.9rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #lb-list { list-style: none; }
    #lb-list li {
      font-size: 0.8rem;
      padding: 3px 0;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a2a55;
    }

    #lb-list li .lb-name { color: #e0e0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
    #lb-list li .lb-score { color: #ffffff; white-space: nowrap; }
    #lb-list li.me .lb-name { color: #ffffff; font-weight: bold; }

    /* Chat */
    #chat-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-section h3 {
      padding: 10px 12px;
      font-size: 0.9rem;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: #1e1e1e;
      border-bottom: 1px solid #2a2a2a;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

    .chat-msg { font-size: 0.82rem; line-height: 1.4; word-break: break-word; }
    .chat-msg .chat-name { color: #aaaaff; font-weight: bold; }
    .chat-msg.system { color: #888888; font-style: italic; }

    #chat-input-row {
      display: flex;
      padding: 8px;
      gap: 6px;
      border-top: 1px solid #2a2a2a;
      background: #1e1e1e;
    }

    #chat-input {
      flex: 1;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #111111;
      color: #e0e0e0;
      font-size: 0.85rem;
      outline: none;
    }

    #chat-send {
      padding: 7px 12px;
      background: #444;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    #chat-send:hover { background: #555; }

    #name-color-picker {
      width: 28px; height: 28px;
      border: 1px solid #555; border-radius: 4px;
      padding: 1px; cursor: pointer;
      background: none; flex-shrink: 0;
    }

    /* Click popups */
    .click-pop {
      position: fixed;
      pointer-events: none;
      font-size: 1.1rem;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 0 0 6px #44444488;
      animation: pop-up 0.8s ease-out forwards;
      z-index: 999;
    }

    @keyframes pop-up {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-50px) scale(1.4); }
    }

    /* ===== RESPONSIVE ===== */

    /* Chromebook / small laptop (900–1200px) */
    @media (max-width: 1100px) {
      #right-panel { width: 230px; min-width: 230px; }
      #upgrades { grid-template-columns: repeat(2, 1fr); }
      #attacks  { grid-template-columns: repeat(2, 1fr); }
    }

    /* Tablet / iPad (600–900px) */
    @media (max-width: 900px) {
      header { padding: 10px 90px; font-size: 1rem; letter-spacing: 1px; }
      #lb-modal-btn, #admin-btn { font-size: 0.72rem; padding: 4px 8px; }
      #right-panel { width: 200px; min-width: 200px; }
      #admin-console { width: calc(100vw - 24px); right: 12px; left: 12px; }
      #lb-modal { width: 95vw; }
    }

    /* Phone / very small screen (< 600px) */
    @media (max-width: 600px) {
      header { padding: 10px 75px; font-size: 0.82rem; letter-spacing: 0; }
      #lb-modal-btn { left: 6px; font-size: 0.68rem; padding: 4px 6px; }
      #admin-btn    { right: 6px; font-size: 0.68rem; padding: 4px 6px; }
      #main { flex-direction: column; overflow-y: auto; }
      #game-panel { overflow-y: visible; }
      #right-panel {
        width: 100%; min-width: 0;
        border-left: none;
        border-top: 2px solid #2a2a2a;
        flex-direction: row;
        max-height: 240px;
      }
      #leaderboard { display: none; }
      #chat-section { flex: 1; min-width: 0; }
      #upgrades { grid-template-columns: repeat(2, 1fr); }
      #attacks  { grid-template-columns: repeat(2, 1fr); }
      #cookie-btn { width: 90px; height: 90px; font-size: 2.4rem; }
      #admin-console { width: calc(100vw - 16px); right: 8px; left: 8px; bottom: 20px; }
    }
  </style>
</head>
<body>

<div id="join-screen">
  <div id="join-box">
    <h2>🍪 IXL Math</h2>
    <input id="auth-username" type="text" placeholder="Username..." maxlength="50" autocomplete="username" />
    <input id="auth-password" type="password" placeholder="Password..." maxlength="50" autocomplete="current-password" />
    <button id="login-btn">Login / Create Account</button>
    <div id="auth-error"></div>
  </div>
</div>

<header>
  <button id="lb-modal-btn" title="Full Leaderboard">🏆 Leaderboard</button>
  🍪 IXL MATH &nbsp;|&nbsp; <span id="name-display" style="color:#aaa;font-size:0.9rem;"></span>
  <button id="admin-btn" title="Admin Panel">🔑 Admin</button>
</header>

<!-- Pay Modal -->
<div id="pay-modal-overlay">
  <div id="pay-modal">
    <div id="pay-modal-header">
      💰 Pay a Player
      <button id="pay-modal-close">✕</button>
    </div>
    <div id="pay-modal-body">
      <select id="pay-target"><option value="">— select player —</option></select>
      <input id="pay-amount" type="text" placeholder="e.g. 1k, 5m, 2b, 1t..." />
      <button id="pay-send-btn">Send Cookies</button>
      <div id="pay-result"></div>
    </div>
  </div>
</div>

<!-- Full Leaderboard Modal -->
<div id="lb-modal-overlay">
  <div id="lb-modal">
    <div id="lb-modal-header">
      🏆 Full Leaderboard
      <button id="lb-modal-close">✕</button>
    </div>
    <div id="lb-modal-body">
      <ul id="lb-modal-list"></ul>
    </div>
  </div>
</div>

<!-- Admin Console -->
<div id="admin-console">
  <div id="admin-console-titlebar">
    <span>🛡️ Admin Console</span>
    <button id="admin-console-close">✕</button>
  </div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ---- Game State ----
  let cookies = 0;
  let totalCps = 0;
  let myName = '';
  let socket;

  // Pre-unlock Web Audio on first touch so jumpscare sound works on mobile
  let audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  document.addEventListener('touchstart', () => getAudioCtx(), { once: true, passive: true });
  document.addEventListener('click',      () => getAudioCtx(), { once: true, passive: true });

  const UPGRADES = [
    { id: 'cursor',     name: '🖱️ Cursor',        desc: '+1 click',          baseCost: 15,       clickPower: 1,    cps: 0 },
    { id: 'grandma',    name: '👵 Grandma',        desc: '+1/sec',            baseCost: 100,      clickPower: 0,    cps: 1 },
    { id: 'farm',       name: '🌾 Farm',           desc: '+5/sec',            baseCost: 500,      clickPower: 0,    cps: 5 },
    { id: 'mine',       name: '⛏️ Mine',           desc: '+10/sec',           baseCost: 2000,     clickPower: 0,    cps: 10 },
    { id: 'factory',    name: '🏭 Factory',        desc: '+20/sec',           baseCost: 8000,     clickPower: 0,    cps: 20 },
    { id: 'bank',       name: '🏦 Bank',           desc: '+50/sec',           baseCost: 20000,    clickPower: 0,    cps: 50 },
    { id: 'temple',     name: '⛩️ Temple',         desc: '+100/sec',          baseCost: 75000,    clickPower: 0,    cps: 100 },
    { id: 'wizard',     name: '🧙 Wizard',         desc: '+200/sec',          baseCost: 200000,   clickPower: 0,    cps: 200 },
    { id: 'shipment',   name: '🚀 Shipment',       desc: '+500/sec',          baseCost: 500000,   clickPower: 0,    cps: 500 },
    { id: 'alchemy',    name: '⚗️ Alchemy',        desc: '+1K/sec',           baseCost: 1500000,  clickPower: 0,    cps: 1000 },
    { id: 'portal',     name: '🌀 Portal',         desc: '+5K/sec',           baseCost: 5000000,  clickPower: 0,    cps: 5000 },
    { id: 'timemachine',name: '⏰ Time Machine',   desc: '+10K/sec',          baseCost: 15000000, clickPower: 0,    cps: 10000 },
    { id: 'antimatter', name: '⚛️ Antimatter',     desc: '+50K/sec',          baseCost: 75000000, clickPower: 0,    cps: 50000 },
    { id: 'prism',      name: '🔮 Prism',          desc: '+200K/sec',         baseCost: 3e8,      clickPower: 0,    cps: 200000 },
    { id: 'chancemaker',name: '🎲 Chancemaker',    desc: '+1M/sec',           baseCost: 1e9,      clickPower: 0,    cps: 1000000 },
    { id: 'fractal',    name: '🌌 Fractal Engine', desc: '+5M/sec',           baseCost: 5e9,      clickPower: 0,    cps: 5000000 },
    { id: 'megaclick',  name: '👆 Mega Click',     desc: '+10 click',         baseCost: 50000,    clickPower: 10,   cps: 0 },
    { id: 'ultraclick', name: '⚡ Ultra Click',    desc: '+50 click',         baseCost: 500000,   clickPower: 50,   cps: 0 },
    { id: 'godclick',   name: '✨ God Click',      desc: '+200 click',        baseCost: 5000000,  clickPower: 200,  cps: 0 },
    { id: 'omnclick',   name: '💥 Omni Click',     desc: '+1000 click',       baseCost: 50000000, clickPower: 1000, cps: 0 },
    { id: 'iceshard',   name: '🧊 Ice Shard',      desc: '+8/sec (frost)',    baseCost: 4000,     clickPower: 0,    cps: 8 },
    { id: 'icecore',    name: '❄️ Ice Core',       desc: '+40/sec (frost)',   baseCost: 30000,    clickPower: 0,    cps: 40 },
    { id: 'icefortress',name: '💎 Ice Fortress',   desc: '+150/sec (frost)',  baseCost: 150000,    clickPower: 0,    cps: 150 },
    // OP Tier
    { id: 'hypermine',  name: '🔩 Hyper Mine',     desc: '+2K/sec',           baseCost: 8000000,   clickPower: 0,    cps: 2000 },
    { id: 'megaportal', name: '🌐 Mega Portal',     desc: '+25K/sec',          baseCost: 1e8,       clickPower: 0,    cps: 25000 },
    { id: 'quantumcpu', name: '🧬 Quantum CPU',     desc: '+200K/sec',         baseCost: 5e9,       clickPower: 0,    cps: 200000 },
    { id: 'darkmatter', name: '🖤 Dark Matter',     desc: '+1M/sec',           baseCost: 5e10,      clickPower: 0,    cps: 1000000 },
    { id: 'multiverse', name: '🌌 Multiverse',      desc: '+5M/sec',           baseCost: 2.5e11,    clickPower: 0,    cps: 5000000 },
    { id: 'cookiegod',  name: '👑 Cookie God',      desc: '+20M/sec',          baseCost: 1e12,      clickPower: 0,    cps: 20000000 },
    { id: 'hyperclk',   name: '🚀 Hyper Click',     desc: '+10K click',        baseCost: 1e8,       clickPower: 10000, cps: 0 },
    { id: 'godsmash',   name: '⚡ God Smash',       desc: '+100K click',       baseCost: 1e10,      clickPower: 100000, cps: 0 },
  ];

  const POWERUPS = [
    { id: 'sugarrush',    name: '🍬 Sugar Rush',    desc: '2× click for 60s',          cost: 50000,      clickBoost: 2,   duration: 60000  },
    { id: 'clickstorm',   name: '👆 Click Storm',   desc: '10× click for 30s',         cost: 200000,     clickBoost: 10,  duration: 30000  },
    { id: 'cookiefury',   name: '🔥 Cookie Fury',   desc: '5× click for 45s',          cost: 500000,     clickBoost: 5,   duration: 45000  },
    { id: 'timewarp',     name: '⏰ Time Warp',      desc: '10× click for 20s',         cost: 2000000,    clickBoost: 10,  duration: 20000  },
    { id: 'clickgod',     name: '✨ Click God',      desc: '50× click for 15s',         cost: 5000000,    clickBoost: 50,  duration: 15000  },
    { id: 'goldencookie', name: '🌟 Golden Cookie',  desc: '20× click for 15s',         cost: 10000000,   clickBoost: 20,  duration: 15000  },
    { id: 'bigbang',      name: '💥 Big Bang',       desc: '100× click for 10s',        cost: 50000000,   clickBoost: 100, duration: 10000  },
    { id: 'omnipotence',  name: '🌌 Omnipotence',    desc: '500× click for 8s',         cost: 500000000,  clickBoost: 500, duration: 8000   },
  ];

  const ATTACKS = [
    { id: 'freeze10',  name: '❄️ Freeze Ray I',   desc: 'Freeze CPS for 10s',  cost: 3000    },
    { id: 'freeze20',  name: '🧊 Freeze Ray II',   desc: 'Freeze CPS for 20s',  cost: 12000   },
    { id: 'freeze30',  name: '💎 Freeze Ray III',  desc: 'Freeze CPS for 30s',  cost: 35000   },
    { id: 'curse',     name: '☠️ Curse',           desc: '-20/sec for 20s',     cost: 15000   },
    { id: 'virus',     name: '🦠 Cookie Virus',    desc: 'Halve CPS for 25s',   cost: 30000   },
    { id: 'drain',     name: '🕳️ Drain',           desc: '-100/sec for 15s',    cost: 50000   },
    { id: 'timetheft', name: '⏳ Time Theft',      desc: 'Reverse CPS for 30s', cost: 200000  },
    { id: 'steal10k',  name: '💸 Cookie Snatch',  desc: 'Remove 10K cookies',  cost: 10000   },
    { id: 'steal100k', name: '🏴‍☠️ Cookie Raid',   desc: 'Remove 100K cookies', cost: 100000  },
    { id: 'steal1m',   name: '👑 Cookie Heist',   desc: 'Remove 1M cookies',   cost: 1000000 },
  ];

  const activeDebuffs = {}; // { type: clearTimeout }
  const activePUBoosts = {}; // { puId: { cpsBoost, clickBoost } }
  let cpsMultiplier = 1;
  let clickMultiplier = 1;

  const owned = {};
  UPGRADES.forEach(u => owned[u.id] = 0);

  function getCost(upg) {
    return Math.floor(upg.baseCost * Math.pow(1.15, owned[upg.id]));
  }

  function getSellValue(upg) {
    if (owned[upg.id] <= 0) return 0;
    return Math.floor(0.3 * upg.baseCost * Math.pow(1.15, owned[upg.id] - 1));
  }

  function rebuildMultipliers() {
    clickMultiplier = Object.values(activePUBoosts).reduce((acc, b) => acc * (b.clickBoost || 1), 1);
    // cpsMultiplier intentionally not affected by power-ups (clicks only)
  }

  function getClickPower() {
    return clickMultiplier * (1 + UPGRADES.filter(u => u.clickPower > 0).reduce((acc, u) => acc + u.clickPower * owned[u.id], 0));
  }

  function recalcCps() {
    totalCps = cpsMultiplier * UPGRADES.filter(u => u.cps > 0).reduce((acc, u) => acc + u.cps * owned[u.id], 0);
  }

  function formatNum(n) {
    if (n >= 1e12) return (n / 1e12).toFixed(1) + 'T';
    if (n >= 1e9)  return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6)  return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3)  return (n / 1e3).toFixed(1) + 'K';
    return Math.floor(n).toString();
  }

  // ---- UI ----
  // Build upgrade buttons once, then only update state
  function buildUpgrades() {
    const container = document.getElementById('upgrades');
    container.innerHTML = '';
    UPGRADES.forEach(upg => {
      const card = document.createElement('div');
      card.className = 'upgrade-btn';
      card.id = 'upg-' + upg.id;
      card.innerHTML = `
        <div class="upg-name">${upg.name}</div>
        <div class="upg-desc">${upg.desc}</div>
        <div class="upg-cost" id="upg-cost-${upg.id}">🍪 ${formatNum(getCost(upg))}</div>
        <div class="upg-owned" id="upg-owned-${upg.id}">owned: 0</div>
        <button class="upg-sell-btn" id="upg-sell-${upg.id}" title="Sell for 30%" disabled>✕</button>
      `;
      card.addEventListener('click', (e) => {
        if (e.target.closest('.upg-sell-btn')) return;
        if (card.classList.contains('disabled')) return;
        const cost = getCost(upg);
        if (cookies >= cost) {
          cookies -= cost;
          owned[upg.id]++;
          recalcCps();
          updateButtons();
          updateDisplay();
          saveProgress();
        }
      });
      card.querySelector('.upg-sell-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        if (owned[upg.id] <= 0) return;
        const refund = getSellValue(upg);
        owned[upg.id]--;
        cookies += refund;
        recalcCps();
        updateButtons();
        updateDisplay();
        saveProgress();
      });
      container.appendChild(card);
    });
  }

  function buildPowerups() {
    const container = document.getElementById('powerups');
    container.innerHTML = '';
    POWERUPS.forEach(pu => {
      const btn = document.createElement('button');
      btn.className = 'powerup-btn';
      btn.id = 'pu-' + pu.id;
      btn.innerHTML = `
        <div class="pu-name">${pu.name}</div>
        <div class="pu-desc">${pu.desc}</div>
        <div class="pu-cost">🍪 ${formatNum(pu.cost)}</div>
        <div class="pu-timer" id="pu-timer-${pu.id}"></div>
      `;
      btn.addEventListener('click', () => {
        if (cookies < pu.cost || activePUBoosts[pu.id]) return;
        cookies -= pu.cost;
        activePUBoosts[pu.id] = { clickBoost: pu.clickBoost || 1 };
        rebuildMultipliers();
        btn.disabled = true;
        let remaining = Math.ceil(pu.duration / 1000);
        const timerEl = document.getElementById('pu-timer-' + pu.id);
        if (timerEl) timerEl.textContent = remaining + 's';
        const iv = setInterval(() => {
          remaining--;
          if (timerEl) timerEl.textContent = remaining > 0 ? remaining + 's' : '';
        }, 1000);
        setTimeout(() => {
          clearInterval(iv);
          delete activePUBoosts[pu.id];
          rebuildMultipliers();
          btn.disabled = cookies < pu.cost;
          if (timerEl) timerEl.textContent = '';
          updateDisplay();
          updateButtons();
        }, pu.duration);
        updateDisplay();
        updateButtons();
        saveProgress();
      });
      container.appendChild(btn);
    });
  }

  function buildAttacks() {
    const container = document.getElementById('attacks');
    container.innerHTML = '';
    ATTACKS.forEach(atk => {
      const btn = document.createElement('button');
      btn.className = 'attack-btn';
      btn.id = 'atk-' + atk.id;
      btn.innerHTML = `
        <div class="atk-name">${atk.name}</div>
        <div class="atk-desc">${atk.desc}</div>
        <div class="atk-cost">🍪 ${formatNum(atk.cost)}</div>
      `;
      btn.addEventListener('click', () => {
        const target = document.getElementById('attack-target').value;
        if (!target) { showAttackError('Pick a target first!'); return; }
        if (target === myName) { showAttackError("You can't attack yourself!"); return; }
        if (cookies >= atk.cost && socket) {
          cookies -= atk.cost;
          socket.emit('attack', { attackId: atk.id, targetName: target });
          updateDisplay();
          updateButtons();
        }
      });
      container.appendChild(btn);
    });
  }

  // Just update disabled state + owned counts — no DOM rebuild
  function updateButtons() {
    UPGRADES.forEach(upg => {
      const cost = getCost(upg);
      const card = document.getElementById('upg-' + upg.id);
      if (!card) return;
      card.classList.toggle('disabled', cookies < cost);
      const costEl = document.getElementById('upg-cost-' + upg.id);
      const ownedEl = document.getElementById('upg-owned-' + upg.id);
      const sellBtn = document.getElementById('upg-sell-' + upg.id);
      if (costEl) costEl.textContent = '🍪 ' + formatNum(cost);
      if (ownedEl) ownedEl.textContent = 'owned: ' + owned[upg.id] + (owned[upg.id] > 0 ? ' (sell: ' + formatNum(getSellValue(upg)) + ')' : '');
      if (sellBtn) sellBtn.disabled = owned[upg.id] <= 0;
    });
    ATTACKS.forEach(atk => {
      const btn = document.getElementById('atk-' + atk.id);
      if (!btn) return;
      btn.disabled = cookies < atk.cost;
    });
    POWERUPS.forEach(pu => {
      const btn = document.getElementById('pu-' + pu.id);
      if (!btn) return;
      if (!activePUBoosts[pu.id]) btn.disabled = cookies < pu.cost;
    });
  }

  function renderUpgrades() { updateButtons(); }
  function renderAttacks()  { updateButtons(); }

  function updateTargetList(players) {
    const sel = document.getElementById('attack-target');
    const current = sel.value;
    sel.innerHTML = '<option value="">— pick player —</option>';
    players.forEach(p => {
      if (p.name !== myName) {
        const opt = document.createElement('option');
        opt.value = p.name;
        opt.textContent = p.name;
        if (p.name === current) opt.selected = true;
        sel.appendChild(opt);
      }
    });
  }

  function applyDebuff(type, duration, label) {
    if (activeDebuffs[type]) clearTimeout(activeDebuffs[type].timer);
    const display = document.getElementById('debuffs-display');
    let chip = document.getElementById('debuff-' + type);
    if (!chip) {
      chip = document.createElement('div');
      chip.className = 'debuff-chip';
      chip.id = 'debuff-' + type;
      display.appendChild(chip);
    }
    chip.textContent = label;
    activeDebuffs[type] = {
      timer: setTimeout(() => {
        chip.remove();
        delete activeDebuffs[type];
      }, duration)
    };
  }

  function updateDisplay() {
    document.getElementById('cookie-count').textContent = formatNum(cookies) + ' cookies';
    document.getElementById('cps-display').textContent = formatNum(totalCps) + ' cookies/sec';
  }

  function showAttackError(msg) {
    const el = document.getElementById('attack-error-msg');
    if (!el) return;
    el.textContent = msg;
    el.style.animation = 'none';
    void el.offsetWidth; // reflow to restart animation
    el.style.animation = 'fadeout 3s forwards';
  }

  // ---- Auto-clicker detection ----
  const clickTimes = [];
  const interClickGaps = [];   // ms between consecutive clicks
  const cpsHistory = [];       // CPS reading each second (last 30s)
  let lastClickTime = 0;

  let acFlagged = false;
  let acFlagStart = null;
  let acLocked = false;
  let acHighCpsSeconds = 0;
  let acWhitelisted = false;

  // On/off cycling state
  let acLastCpsWasZero = true;
  let acOnOffCount = 0;
  let acOnOffResetTimer = null;

  // Sustained consistent-CPS state
  let acSustainedMidSecs = 0;

  function acStdDev(arr) {
    if (arr.length < 2) return 999;
    const mean = arr.reduce((a, b) => a + b, 0) / arr.length;
    return Math.sqrt(arr.reduce((a, b) => a + (b - mean) ** 2, 0) / arr.length);
  }
  function acMean(arr) {
    return arr.reduce((a, b) => a + b, 0) / arr.length;
  }

  function showFlagBanner(visible) {
    let banner = document.getElementById('ac-banner');
    if (visible) {
      if (!banner) {
        banner = document.createElement('div');
        banner.id = 'ac-banner';
        banner.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#ff2222;color:#fff;font-weight:bold;font-size:1rem;padding:12px 24px;border-radius:8px;z-index:9999;text-align:center;box-shadow:0 0 20px #ff000088;';
        banner.textContent = '🚫 Auto-click detected! Locked for 10s.';
        document.body.appendChild(banner);
      }
    } else {
      if (banner) banner.remove();
    }
  }

  function lockCookieBtn(reason) {
    if (acWhitelisted) return;
    acLocked = true;
    const btn = document.getElementById('cookie-btn');
    btn.disabled = true;
    btn.style.opacity = '0.4';
    btn.textContent = '🚫';
    showFlagBanner(true);
    if (socket && myName) {
      socket.emit('autoclicker_report', { cps: (clickTimes.length / 3).toFixed(1), locked: true, reason });
    }
    setTimeout(() => {
      acLocked = false;
      acHighCpsSeconds = 0;
      acSustainedMidSecs = 0;
      acOnOffCount = 0;
      clickTimes.length = 0;
      interClickGaps.length = 0;
      cpsHistory.length = 0;
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.textContent = '🍪';
      showFlagBanner(false);
      if (socket && myName) socket.emit('autoclicker_report', { unlocked: true });
    }, 10000);
  }

  function checkAutoClicker() {
    if (acLocked || acWhitelisted) return;
    const now = Date.now();

    // Sliding 3s window for current CPS
    while (clickTimes.length && now - clickTimes[0] > 3000) clickTimes.shift();
    const cps = clickTimes.length / 3;

    // Record CPS history (last 30 readings)
    cpsHistory.push(cps);
    if (cpsHistory.length > 30) cpsHistory.shift();

    // --- 1. Raw high CPS (unchanged) ---
    if (cps >= 30) {
      acHighCpsSeconds++;
      if (acHighCpsSeconds >= 3) { lockCookieBtn('sustained high CPS'); return; }
    } else {
      acHighCpsSeconds = 0;
    }

    // --- 2. Inter-click interval consistency ---
    // Bots have very uniform gaps; humans vary wildly.
    if (interClickGaps.length >= 15) {
      const mean = acMean(interClickGaps);
      const sd   = acStdDev(interClickGaps);
      const cv   = sd / mean; // coefficient of variation
      // Rapid AND suspiciously uniform (CV < 0.20 at 8+ CPS)
      if (mean < 125 && cv < 0.20) {
        lockCookieBtn('mechanical interval pattern (CV=' + cv.toFixed(2) + ')');
        return;
      }
    }

    // --- 3. On/off cycling ---
    // Detects toggling autoclicker on and off to evade sustained-rate checks.
    if (cps === 0 && !acLastCpsWasZero) {
      acLastCpsWasZero = true;
    } else if (cps >= 8 && acLastCpsWasZero) {
      acLastCpsWasZero = false;
      acOnOffCount++;
      if (!acOnOffResetTimer) {
        acOnOffResetTimer = setTimeout(() => { acOnOffCount = 0; acOnOffResetTimer = null; }, 60000);
      }
      if (acOnOffCount >= 5) { lockCookieBtn('on/off cycling (' + acOnOffCount + 'x in 60s)'); return; }
    }

    // --- 4. Sustained mid-range CPS with low variance ---
    // Catches randomised autoclickers that stay between 8–28 CPS for a long time.
    if (cps >= 8 && cps < 30) {
      acSustainedMidSecs++;
      if (acSustainedMidSecs >= 20 && cpsHistory.length >= 15) {
        const recent = cpsHistory.slice(-15);
        const mean = acMean(recent);
        const cv   = acStdDev(recent) / (mean || 1);
        if (mean >= 8 && cv < 0.35) {
          lockCookieBtn('sustained consistent CPS (mean=' + mean.toFixed(1) + ' cv=' + cv.toFixed(2) + ')');
          return;
        }
      }
    } else {
      acSustainedMidSecs = 0;
    }

    // --- Admin reporting (flag when suspicious, un-flag when normal) ---
    if (cps >= 15 && !acFlagged) {
      acFlagged = true;
      acFlagStart = now;
      const reason = interClickGaps.length >= 15
        ? 'cv=' + (acStdDev(interClickGaps) / acMean(interClickGaps)).toFixed(2)
        : '';
      if (socket && myName) socket.emit('autoclicker_report', { cps: cps.toFixed(1), reason });
    } else if (cps < 15 && acFlagged) {
      const duration = ((now - acFlagStart) / 1000).toFixed(0);
      if (socket && myName) socket.emit('autoclicker_report', { cps: cps.toFixed(1), ended: true, duration });
      acFlagged = false;
      acFlagStart = null;
    }
  }
  setInterval(checkAutoClicker, 1000);

  // ---- Cookie click ----
  document.getElementById('cookie-btn').addEventListener('click', (e) => {
    const now = Date.now();
    if (lastClickTime > 0 && now - lastClickTime < 2000) {
      interClickGaps.push(now - lastClickTime);
      if (interClickGaps.length > 40) interClickGaps.shift();
    }
    lastClickTime = now;
    clickTimes.push(now);
    const power = getClickPower();
    cookies += power;
    updateDisplay();
    renderUpgrades();

    // Pop animation
    const pop = document.createElement('div');
    pop.className = 'click-pop';
    pop.textContent = '+' + formatNum(power);
    pop.style.left = (e.clientX - 15) + 'px';
    pop.style.top  = (e.clientY - 10) + 'px';
    document.body.appendChild(pop);
    setTimeout(() => pop.remove(), 800);
  });

  // ---- AFK detection ----
  const AFK_MS = 10 * 60 * 1000; // 10 minutes
  let lastActivity = Date.now();
  let afkFrozen = false;

  function resetActivity() {
    lastActivity = Date.now();
    if (afkFrozen) unfreeze();
  }

  function unfreeze() {
    afkFrozen = false;
    const overlay = document.getElementById('afk-overlay');
    if (overlay) overlay.remove();
  }

  function showAfkOverlay() {
    if (document.getElementById('afk-overlay')) return;
    const overlay = document.createElement('div');
    overlay.id = 'afk-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:#000000cc;z-index:5000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;cursor:pointer;';
    overlay.innerHTML = '<div style="font-size:3rem">💤</div><div style="color:#fff;font-size:1.4rem;font-weight:bold;">You\'re AFK!</div><div style="color:#aaa;font-size:0.9rem;">Cookie production paused. Click to resume.</div>';
    overlay.addEventListener('click', () => { resetActivity(); });
    document.body.appendChild(overlay);
  }

  // Track any meaningful interaction as activity
  ['click','keydown','mousemove','touchstart'].forEach(evt => {
    document.addEventListener(evt, () => { if (myName) resetActivity(); }, { passive: true });
  });

  // ---- Game loop ----
  let drainAmount = 0; // active curse drain per tick
  setInterval(() => {
    // AFK check
    if (myName && !afkFrozen && Date.now() - lastActivity > AFK_MS) {
      afkFrozen = true;
      showAfkOverlay();
    }

    if (afkFrozen) return; // production paused while AFK

    let gained = totalCps / 20;
    if (drainAmount > 0) gained -= drainAmount / 20;
    if (gained !== 0) {
      cookies = Math.max(0, cookies + gained);
      updateDisplay();
      renderUpgrades();
      renderAttacks();
    } else if (totalCps > 0) {
      updateDisplay();
      renderUpgrades();
      renderAttacks();
    }
    if (socket && myName) {
      socket.emit('update_score', { cookies: Math.floor(cookies), cps: totalCps });
    }
  }, 50);

  function saveProgress() {
    if (!myName) return;
    localStorage.setItem('cc_' + myName, JSON.stringify({ cookies: Math.floor(cookies), owned }));
    if (socket) socket.emit('save_progress', { cookies: Math.floor(cookies), owned });
  }

  // Save every second
  setInterval(saveProgress, 1000);
  // Save when tab closes
  window.addEventListener('beforeunload', saveProgress);

  // ---- Join ----
  function startGame(name, existingSocket) {
    myName = name;
    document.getElementById('join-screen').style.display = 'none';
    socket = existingSocket;

    renderUpgrades();
    renderAttacks();
    updateDisplay();

    socket.emit('join', name);
    document.getElementById('name-display').textContent = name;

    // Load saved name color and wire up color picker
    const savedColor = localStorage.getItem('cc_color_' + name) || '#aaaaff';
    const colorPicker = document.getElementById('name-color-picker');
    colorPicker.value = savedColor;
    socket.emit('set_name_color', savedColor);
    colorPicker.addEventListener('input', () => {
      const c = colorPicker.value;
      localStorage.setItem('cc_color_' + name, c);
      socket.emit('set_name_color', c);
    });

    socket.io.on('reconnect', () => {
      socket.emit('join', name);
      const c = localStorage.getItem('cc_color_' + name) || '#aaaaff';
      socket.emit('set_name_color', c);
    });

    let fullLeaderboard = [];

    socket.on('leaderboard', (lb) => {
      fullLeaderboard = lb;

      const list = document.getElementById('lb-list');
      list.innerHTML = '';
      lb.forEach((p, i) => {
        const li = document.createElement('li');
        if (p.name === myName) li.classList.add('me');
        li.innerHTML = `
          <span class="lb-name">${i + 1}. ${p.online ? '<span style="color:#4f4" title="Online">●</span> ' : '<span style="color:#888" title="Offline">●</span> '}${p.name}</span>
          <span class="lb-score">${formatNum(p.cookies)}</span>
        `;
        list.appendChild(li);
      });

      // If modal is open, refresh it live
      if (document.getElementById('lb-modal-overlay').classList.contains('open')) {
        renderModalLeaderboard();
      }

      updateTargetList(lb);

      // Also update pay target list (online players only)
      const paySelect = document.getElementById('pay-target');
      const prevPay = paySelect.value;
      paySelect.innerHTML = '<option value="">— select player —</option>';
      lb.filter(p => p.online && p.name !== myName).forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.name; opt.textContent = p.name;
        if (p.name === prevPay) opt.selected = true;
        paySelect.appendChild(opt);
      });
    });

    function renderModalLeaderboard() {
      const ul = document.getElementById('lb-modal-list');
      ul.innerHTML = '';
      fullLeaderboard.forEach((p, i) => {
        const li = document.createElement('li');
        li.innerHTML = `
          <span class="lbm-rank">${i + 1}.</span>
          <span class="lbm-name${p.name === myName ? ' me' : ''}">${p.online ? '<span style="color:#4f4" title="Online">●</span> ' : '<span style="color:#888" title="Offline">●</span> '}${p.name}</span>
          <span class="lbm-score">${formatNum(p.cookies)}</span>
        `;
        ul.appendChild(li);
      });
    }

    document.getElementById('lb-modal-btn').addEventListener('click', () => {
      renderModalLeaderboard();
      document.getElementById('lb-modal-overlay').classList.add('open');
    });

    document.getElementById('lb-modal-close').addEventListener('click', () => {
      document.getElementById('lb-modal-overlay').classList.remove('open');
    });

    document.getElementById('lb-modal-overlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('lb-modal-overlay')) {
        document.getElementById('lb-modal-overlay').classList.remove('open');
      }
    });

    socket.on('chat_cooldown', (secs) => {
      const input = document.getElementById('chat-input');
      input.placeholder = secs === 'muted' ? 'You are muted.' : `Wait ${secs}s...`;
      if (secs !== 'muted') setTimeout(() => { input.placeholder = 'Say something...'; }, secs * 1000);
    });

    socket.on('chat', ({ system, name, nameColor, msg, time }) => {
      const msgs = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-msg' + (system ? ' system' : '');
      if (system) {
        div.textContent = msg;
      } else {
        const color = nameColor || '#aaaaff';
        div.innerHTML = `<span class="chat-name" style="color:${color}">${name}:</span> ${msg}`;
      }
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    });

    socket.on('chat_clear', () => {
      document.getElementById('chat-messages').innerHTML = '';
    });

    socket.on('banned', (info) => {
      document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#111;color:#ff5555;font-family:monospace;font-size:1.2rem;flex-direction:column;gap:12px;">
        <div style="font-size:3rem">🔨</div>
        <div>You have been banned.</div>
        <div style="color:#888;font-size:0.9rem">${info === 'permanent' ? 'This ban is permanent.' : 'Duration: ' + info}</div>
      </div>`;
    });

    // Attack received
    socket.on('attack_hit', ({ attackId, attackerName }) => {
      if (attackId === 'freeze10') {
        const prev = totalCps;
        totalCps = 0;
        applyDebuff('freeze', 10000, '❄️ Freeze Ray I! CPS=0 for 10s');
        setTimeout(() => { totalCps = prev; }, 10000);
      } else if (attackId === 'freeze20') {
        const prev = totalCps;
        totalCps = 0;
        applyDebuff('freeze', 20000, '🧊 Freeze Ray II! CPS=0 for 20s');
        setTimeout(() => { totalCps = prev; }, 20000);
      } else if (attackId === 'freeze30') {
        const prev = totalCps;
        totalCps = 0;
        applyDebuff('freeze', 30000, '💎 Freeze Ray III! CPS=0 for 30s');
        setTimeout(() => { totalCps = prev; }, 30000);
      } else if (attackId === 'curse') {
        drainAmount = 20;
        applyDebuff('curse', 20000, '☠️ Cursed! -20/sec');
        setTimeout(() => { drainAmount = 0; }, 20000);
      } else if (attackId === 'virus') {
        const prev = totalCps;
        totalCps = Math.floor(prev / 2);
        applyDebuff('virus', 25000, '🦠 Virus! CPS halved');
        setTimeout(() => { totalCps = prev; }, 25000);
      } else if (attackId === 'drain') {
        drainAmount = (drainAmount || 0) + 100;
        applyDebuff('drain', 15000, '🕳️ Drained! -100/sec');
        setTimeout(() => { drainAmount = Math.max(0, drainAmount - 100); }, 15000);
      } else if (attackId === 'timetheft') {
        const prev = totalCps;
        totalCps = -prev;
        applyDebuff('timetheft', 30000, '⏳ Time Theft! CPS reversed');
        setTimeout(() => { totalCps = prev; }, 30000);
      } else if (attackId === 'steal10k') {
        cookies = Math.max(0, cookies - 10000);
        applyDebuff('steal', 3000, '💸 Cookie Snatch! Lost 10,000 cookies');
      } else if (attackId === 'steal100k') {
        cookies = Math.max(0, cookies - 100000);
        applyDebuff('steal', 3000, '🏴‍☠️ Cookie Raid! Lost 100,000 cookies');
      } else if (attackId === 'steal1m') {
        cookies = Math.max(0, cookies - 1000000);
        applyDebuff('steal', 3000, '👑 Cookie Heist! Lost 1,000,000 cookies');
      }
      updateDisplay();
      // Show in chat
      const msgs = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-msg system';
      div.textContent = `⚔️ ${attackerName} attacked you with ${attackId}!`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    });

    socket.on('attack_error', ({ msg, refund }) => {
      if (refund) { cookies += refund; updateDisplay(); updateButtons(); }
      showAttackError(msg);
    });

    socket.on('ac_whitelisted', () => { acWhitelisted = true; });
    socket.on('ac_blacklisted', () => { acWhitelisted = false; });

    socket.on('pay_result', ({ ok, msg, amount }) => {
      const resEl = document.getElementById('pay-result');
      resEl.style.color = ok ? '#44ff88' : '#ff5555';
      resEl.textContent = msg;
      if (!ok && amount) { cookies += amount; } // refund if rejected
      updateDisplay(); updateButtons(); saveProgress();
    });

    socket.on('pay_received', ({ fromName, amount }) => {
      cookies += amount;
      updateDisplay();
      updateButtons();
      saveProgress();
      const msgs = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-msg system';
      div.textContent = `💰 ${fromName} sent you ${formatNum(amount)} cookies!`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    });

    socket.on('admin_reset_you', () => {
      cookies = 0; totalCps = 0;
      Object.keys(owned).forEach(k => owned[k] = 0);
      recalcCps(); updateDisplay(); updateButtons(); saveProgress();
    });

    socket.on('admin_wipe_upgrades_you', () => {
      Object.keys(owned).forEach(k => owned[k] = 0);
      recalcCps(); updateDisplay(); updateButtons(); saveProgress();
    });

    socket.on('jumpscare', () => {
      // Flashbang: white blinding flash with grenade emoji
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:#ffffff;z-index:99999;pointer-events:none;display:flex;align-items:center;justify-content:center;font-size:25vw;transition:opacity 1.5s;';
      overlay.textContent = '💣';
      document.body.appendChild(overlay);
      // Fade out slowly like a real flashbang
      requestAnimationFrame(() => requestAnimationFrame(() => { overlay.style.opacity = '0'; }));
      setTimeout(() => overlay.remove(), 2000);

      // Flashbang sound: deep bass boom then ear ringing
      try {
        const ctx = getAudioCtx();
        if (ctx.state === 'suspended') ctx.resume();
        const t = ctx.currentTime;

        // Bass boom — starts high enough for phone speakers, drops fast
        const boom = ctx.createOscillator();
        const boomGain = ctx.createGain();
        boom.frequency.setValueAtTime(180, t);
        boom.frequency.exponentialRampToValueAtTime(80, t + 0.4);
        boomGain.gain.setValueAtTime(5, t);
        boomGain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
        boom.connect(boomGain); boomGain.connect(ctx.destination);
        boom.start(t); boom.stop(t + 0.5);

        // Noise crack — adds the punch/impact to the boom
        const bufSize = ctx.sampleRate * 0.15;
        const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
        const data = buf.getChannelData(0);
        for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
        const noise = ctx.createBufferSource();
        noise.buffer = buf;
        const noiseGain = ctx.createGain();
        noiseGain.gain.setValueAtTime(4, t);
        noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
        noise.connect(noiseGain); noiseGain.connect(ctx.destination);
        noise.start(t); noise.stop(t + 0.15);

        // Ear ringing tinnitus — starts after the boom
        const ring = ctx.createOscillator();
        const ringGain = ctx.createGain();
        ring.frequency.setValueAtTime(6500, t + 0.2);
        ring.frequency.linearRampToValueAtTime(4800, t + 4);
        ringGain.gain.setValueAtTime(0, t + 0.2);
        ringGain.gain.linearRampToValueAtTime(1.5, t + 0.4);
        ringGain.gain.exponentialRampToValueAtTime(0.001, t + 4);
        ring.connect(ringGain); ringGain.connect(ctx.destination);
        ring.start(t + 0.2); ring.stop(t + 4);
      } catch(e) {}
    });

    socket.on('admin_cookie_change', ({ amount, action }) => {
      if (action === 'add') cookies += amount;
      else cookies = Math.max(0, cookies - amount);
      updateDisplay(); updateButtons();
    });

    socket.on('admin_result', ({ success }) => {
      if (success) {
        document.getElementById('admin-login-bar').style.display = 'none';
        document.getElementById('admin-output').style.display = 'block';
        document.getElementById('admin-cmd-bar').style.display = 'flex';
        adminLog('Logged in. Type /help for commands.', 'alog-ok');
      } else {
        const err = document.getElementById('admin-error');
        err.style.display = 'block';
        err.textContent = 'Wrong password.';
      }
    });

    socket.on('admin_action_result', ({ ok, msg }) => {
      // Auto-open admin console for autoclicker alerts
      if (msg && msg.includes('[AUTOCLICKER]')) {
        const c = document.getElementById('admin-console');
        if (c.style.display !== 'flex') c.style.display = 'flex';
      }
      adminLog(msg, ok ? 'alog-ok' : 'alog-err');
    });

    socket.on('admin_playerlist', () => {});
  }


  // ---- Admin ----
  // ---- Admin Console ----
  function adminLog(msg, cls = 'alog-info') {
    const out = document.getElementById('admin-output');
    const line = document.createElement('div');
    line.className = cls;
    line.textContent = msg;
    out.appendChild(line);
    out.scrollTop = out.scrollHeight;
  }

  function resetAdminConsole() {
    document.getElementById('admin-login-bar').style.display = 'flex';
    document.getElementById('admin-output').style.display = 'none';
    document.getElementById('admin-cmd-bar').style.display = 'none';
    document.getElementById('admin-error').style.display = 'none';
    document.getElementById('admin-pass').value = '';
    document.getElementById('admin-output').innerHTML = '';
  }

  document.getElementById('admin-btn').addEventListener('click', () => {
    const c = document.getElementById('admin-console');
    if (c.style.display === 'flex') {
      c.style.display = 'none';
    } else {
      resetAdminConsole();
      c.style.display = 'flex';
    }
  });

  document.getElementById('admin-console-close').addEventListener('click', () => {
    document.getElementById('admin-console').style.display = 'none';
  });

  document.getElementById('admin-submit').addEventListener('click', () => {
    const pass = document.getElementById('admin-pass').value;
    if (socket) socket.emit('admin_login', pass);
  });

  document.getElementById('admin-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('admin-submit').click();
  });

  const cmdHistory = [];
  let cmdHistoryIdx = -1;
  document.getElementById('admin-cmd').addEventListener('keydown', e => {
    if (e.key === 'ArrowUp') {
      if (cmdHistoryIdx < cmdHistory.length - 1) cmdHistoryIdx++;
      e.target.value = cmdHistory[cmdHistoryIdx] || '';
      return;
    }
    if (e.key === 'ArrowDown') {
      if (cmdHistoryIdx > 0) cmdHistoryIdx--;
      e.target.value = cmdHistory[cmdHistoryIdx] || '';
      return;
    }
    if (e.key !== 'Enter') return;
    const raw = e.target.value.trim();
    if (!raw) return;
    cmdHistory.unshift(raw); cmdHistoryIdx = -1;
    adminLog('> ' + raw, 'alog-info');
    e.target.value = '';

    const parts = raw.split(/\s+/);
    const cmd = parts[0].toLowerCase();

    if (cmd === '/help') {
      adminLog('/mute (name)                   — permanent mute', 'alog-warn');
      adminLog('/unmute (name)                 — remove mute', 'alog-warn');
      adminLog('/timeout (name) (sec)          — temp mute', 'alog-warn');
      adminLog('/ban (name) (sec|perm)         — ban by name', 'alog-warn');
      adminLog('/ipban (ip) (sec|perm)         — ban by IP', 'alog-warn');
      adminLog('/clear                         — clear chat', 'alog-warn');
      adminLog('/wipeaccount (name)            — wipe coins & upgrades (keep account)', 'alog-warn');
      adminLog('/wipeupgrades (name)           — wipe upgrades only', 'alog-warn');
      adminLog('/delaccount (name)             — fully delete account + kick', 'alog-warn');
      adminLog('/cookie add (name) (amount)    — give cookies', 'alog-warn');
      adminLog('/cookie remove (name) (amount) — take cookies', 'alog-warn');
      adminLog('/cookie wipe (name)            — set cookies to 0', 'alog-warn');
      adminLog('/setpassword (newpassword)      — change admin password', 'alog-warn');
      adminLog('/wipeall                       — wipe ALL accounts (cookies + upgrades)', 'alog-warn');
      adminLog('/autowhite (name)              — exempt from autoclicker detection', 'alog-warn');
      adminLog('/autoblack (name)              — remove autoclicker exemption', 'alog-warn');
      adminLog('/jumpscare (name)              — blast meme jumpscare at a player', 'alog-warn');
      return;
    }
    if (!socket) { adminLog('Not connected.', 'alog-err'); return; }

    if (cmd === '/mute') {
      if (!parts[1]) { adminLog('Usage: /mute (name)', 'alog-err'); return; }
      socket.emit('admin_mute', parts[1]);
    } else if (cmd === '/unmute') {
      if (!parts[1]) { adminLog('Usage: /unmute (name)', 'alog-err'); return; }
      socket.emit('admin_unmute', parts[1]);
    } else if (cmd === '/clear') {
      socket.emit('admin_clearchat');
    } else if (cmd === '/timeout') {
      if (!parts[1] || !parts[2]) { adminLog('Usage: /timeout (name) (seconds)', 'alog-err'); return; }
      socket.emit('admin_timeout', { name: parts[1], seconds: parseInt(parts[2]) });
    } else if (cmd === '/ban') {
      if (!parts[1] || !parts[2]) { adminLog('Usage: /ban (name) (seconds|perm)', 'alog-err'); return; }
      socket.emit('admin_ban', { name: parts[1], duration: parts[2] === 'perm' ? 'perm' : parseInt(parts[2]) });
    } else if (cmd === '/ipban') {
      if (!parts[1] || !parts[2]) { adminLog('Usage: /ipban (ip) (seconds|perm)', 'alog-err'); return; }
      socket.emit('admin_ipban', { ip: parts[1], duration: parts[2] === 'perm' ? 'perm' : parseInt(parts[2]) });
    } else if (cmd === '/wipeaccount') {
      if (!parts[1]) { adminLog('Usage: /wipeaccount (name)', 'alog-err'); return; }
      socket.emit('admin_wipeaccount', parts[1]);
    } else if (cmd === '/wipeupgrades') {
      if (!parts[1]) { adminLog('Usage: /wipeupgrades (name)', 'alog-err'); return; }
      socket.emit('admin_wipe_upgrades', parts[1]);
    } else if (cmd === '/delaccount') {
      if (!parts[1]) { adminLog('Usage: /delaccount (name)', 'alog-err'); return; }
      socket.emit('admin_delaccount', parts[1]);
    } else if (cmd === '/cookie') {
      const action = parts[1];
      if (action === 'add') {
        if (!parts[2] || !parts[3]) { adminLog('Usage: /cookie add (name) (amount)', 'alog-err'); return; }
        socket.emit('admin_cookies', { name: parts[2], amount: parseInt(parts[3]), action: 'add' });
      } else if (action === 'remove') {
        if (!parts[2] || !parts[3]) { adminLog('Usage: /cookie remove (name) (amount)', 'alog-err'); return; }
        socket.emit('admin_cookies', { name: parts[2], amount: parseInt(parts[3]), action: 'remove' });
      } else if (action === 'wipe') {
        if (!parts[2]) { adminLog('Usage: /cookie wipe (name)', 'alog-err'); return; }
        socket.emit('admin_cookies', { name: parts[2], amount: 999999999999, action: 'remove' });
      } else {
        adminLog('Usage: /cookie add/remove/wipe (name) (amount)', 'alog-err');
      }
    } else if (cmd === '/setpassword') {
      if (!parts[1]) { adminLog('Usage: /setpassword (newpassword)', 'alog-err'); return; }
      socket.emit('admin_setpassword', parts[1]);
    } else if (cmd === '/wipeall') {
      socket.emit('admin_wipeall');
    } else if (cmd === '/autowhite') {
      if (!parts[1]) { adminLog('Usage: /autowhite (name)', 'alog-err'); return; }
      socket.emit('admin_autowhite', parts[1]);
    } else if (cmd === '/autoblack') {
      if (!parts[1]) { adminLog('Usage: /autoblack (name)', 'alog-err'); return; }
      socket.emit('admin_autoblack', parts[1]);
    } else if (cmd === '/jumpscare') {
      if (!parts[1]) { adminLog('Usage: /jumpscare (name)', 'alog-err'); return; }
      socket.emit('admin_jumpscare', parts[1]);
    } else {
      adminLog('Unknown command. Type /help', 'alog-err');
    }
  });

  // ---- Auth ----
  const socket0 = io();

  function doAuth(isRegister) {
    const username = document.getElementById('auth-username').value.trim();
    const password = document.getElementById('auth-password').value;
    const errEl = document.getElementById('auth-error');
    if (!username) { errEl.textContent = 'Enter a username.'; return; }
    if (!password) { errEl.textContent = 'Enter a password.'; return; }
    errEl.textContent = '';
    socket0.emit('auth', { username, password, isRegister });
  }

  document.getElementById('login-btn').addEventListener('click', () => doAuth(false));
  document.getElementById('auth-password').addEventListener('keydown', e => { if (e.key === 'Enter') doAuth(false); });

  socket0.on('force_logout', (msg) => {
    alert(msg || 'You were logged in from another location.');
    location.reload();
  });

  socket0.on('auth_result', ({ ok, msg, username, cookies: savedCookies, owned: savedOwned }) => {
    if (!ok) {
      document.getElementById('auth-error').textContent = msg;
      return;
    }
    // Always trust server data — it's authoritative across devices
    cookies = savedCookies || 0;
    const serverOwned = savedOwned || {};
    Object.keys(serverOwned).forEach(k => {
      if (owned[k] !== undefined) owned[k] = Number(serverOwned[k]) || 0;
    });
    recalcCps();
    startGame(username, socket0);
  });

  // ---- Chat send ----
  function sendChat() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (msg && socket) {
      socket.emit('chat_msg', msg);
      input.value = '';
    }
  }

  document.getElementById('chat-send').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendChat();
  });

  // ---- Pay modal ----
  document.getElementById('pay-btn').addEventListener('click', () => {
    document.getElementById('pay-result').textContent = '';
    document.getElementById('pay-modal-overlay').classList.add('open');
  });
  document.getElementById('pay-modal-close').addEventListener('click', () => {
    document.getElementById('pay-modal-overlay').classList.remove('open');
  });
  document.getElementById('pay-modal-overlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('pay-modal-overlay'))
      document.getElementById('pay-modal-overlay').classList.remove('open');
  });
  function parseShorthand(str) {
    str = String(str).trim().toLowerCase().replace(/,/g, '');
    const m = str.match(/^(\d+\.?\d*)([kmbt]?)$/);
    if (!m) return 0;
    const n = parseFloat(m[1]);
    const mult = { k: 1e3, m: 1e6, b: 1e9, t: 1e12 }[m[2]] || 1;
    return Math.floor(n * mult);
  }

  document.getElementById('pay-send-btn').addEventListener('click', () => {
    if (!socket) return;
    const targetName = document.getElementById('pay-target').value;
    const amount = parseShorthand(document.getElementById('pay-amount').value);
    const resEl = document.getElementById('pay-result');
    if (!targetName) { resEl.style.color = '#ff5555'; resEl.textContent = 'Pick a player.'; return; }
    if (!amount || amount < 1) { resEl.style.color = '#ff5555'; resEl.textContent = 'Enter a valid amount (e.g. 1k, 5m, 2b).'; return; }
    if (amount > cookies) { resEl.style.color = '#ff5555'; resEl.textContent = 'Not enough cookies.'; return; }
    cookies -= amount;
    updateDisplay(); updateButtons();
    socket.emit('pay_player', { targetName, amount });
  });

  // ---- Init (before login) ----
  buildUpgrades();
  buildPowerups();
  buildAttacks();
  updateDisplay();
</script>
</body>
</html>
