<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111111;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #1e1e1e;
      padding: 10px 20px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffffff;
      border-bottom: 2px solid #333;
      letter-spacing: 2px;
    }

    #admin-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #admin-btn:hover { background: #444; }

    #admin-box {
      background: #1e1e1e;
      border: 2px solid #444;
      border-radius: 12px;
      padding: 24px;
      min-width: 320px;
      max-width: 420px;
      width: 90%;
    }
    #admin-box h3 { color: #fff; margin-bottom: 14px; }
    #admin-pass {
      width: 100%; padding: 8px 10px; border-radius: 6px;
      border: 1px solid #444; background: #111; color: #eee;
      font-size: 0.9rem; outline: none; margin-bottom: 8px;
    }
    #admin-submit {
      width: 100%; padding: 10px; background: #444; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
    }
    #admin-submit:hover { background: #555; }
    .admin-player-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid #333; font-size: 0.85rem;
    }
    .admin-player-row .apname { color: #eee; flex: 1; }
    .admin-player-row .apname.muted { color: #888; text-decoration: line-through; }
    .admin-player-row button {
      margin-left: 6px; padding: 3px 8px; border: none; border-radius: 4px;
      cursor: pointer; font-size: 0.75rem; font-weight: bold;
    }
    .btn-mute { background: #555; color: #fff; }
    .btn-unmute { background: #335533; color: #aaffaa; }
    .btn-reset { background: #553333; color: #ffaaaa; }
    #admin-clearchat-btn {
      background: #444; color: #fff; border: none; border-radius: 6px;
      padding: 5px 12px; cursor: pointer; font-size: 0.8rem;
    }

    #name-changer {
      font-size: 0.9rem;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #e0e0e0;
      outline: none;
      width: 140px;
      vertical-align: middle;
    }

    #join-screen {
      position: fixed;
      inset: 0;
      background: #111111dd;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #join-box {
      background: #1e1e1e;
      border: 2px solid #444;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      min-width: 300px;
    }

    #join-box h2 { color: #ffffff; margin-bottom: 20px; font-size: 1.5rem; }

    #join-box input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #e0e0e0;
      font-size: 1rem;
      margin-bottom: 14px;
      outline: none;
    }

    #join-box button {
      width: 100%;
      padding: 12px;
      background: #444;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    #join-box button:hover { background: #555; }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* === GAME PANEL === */
    #game-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-y: auto;
      gap: 16px;
    }

    #cookie-count {
      font-size: 1.8rem;
      color: #ffffff;
      font-weight: bold;
      text-shadow: 0 0 10px #55555588;
    }

    #cps-display { color: #aaaaaa; font-size: 0.95rem; }

    #cookie-btn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 4px solid #555;
      background: radial-gradient(circle at 40% 35%, #c87820, #7a3b00);
      cursor: pointer;
      font-size: 4rem;
      user-select: none;
      transition: transform 0.08s, box-shadow 0.08s;
      box-shadow: 0 0 30px #33333355;
    }

    #cookie-btn:active {
      transform: scale(0.93);
      box-shadow: 0 0 10px #22222244;
    }

    #upgrades-title {
      font-size: 1rem;
      color: #aaaaaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #upgrades {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 420px;
    }

    .upgrade-btn {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      color: #e0e0e0;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
    }

    .upgrade-btn:hover:not(:disabled) {
      border-color: #666;
      background: #2a2a2a;
    }

    .upgrade-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .upgrade-btn .upg-name { font-weight: bold; font-size: 0.9rem; }
    .upgrade-btn .upg-desc { font-size: 0.75rem; color: #aaaaaa; margin-top: 2px; }
    .upgrade-btn .upg-cost { font-size: 0.8rem; color: #ffffff; margin-top: 4px; }
    .upgrade-btn .upg-owned { font-size: 0.7rem; color: #aaaaaa; }

    /* === RIGHT PANEL === */
    #right-panel {
      width: 280px;
      display: flex;
      flex-direction: column;
      border-left: 2px solid #2a2a2a;
      overflow: hidden;
    }

    /* Leaderboard */
    #leaderboard {
      background: #181818;
      padding: 12px;
      border-bottom: 2px solid #2a2a2a;
    }

    #leaderboard h3 {
      color: #ffffff;
      font-size: 0.9rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #lb-list { list-style: none; }
    #lb-list li {
      font-size: 0.8rem;
      padding: 3px 0;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a2a55;
    }

    #lb-list li .lb-name { color: #e0e0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
    #lb-list li .lb-score { color: #ffffff; white-space: nowrap; }
    #lb-list li.me .lb-name { color: #ffffff; font-weight: bold; }

    /* Chat */
    #chat-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-section h3 {
      padding: 10px 12px;
      font-size: 0.9rem;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: #1e1e1e;
      border-bottom: 1px solid #2a2a2a;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

    .chat-msg { font-size: 0.82rem; line-height: 1.4; word-break: break-word; }
    .chat-msg .chat-name { color: #aaaaff; font-weight: bold; }
    .chat-msg.system { color: #888888; font-style: italic; }

    #chat-input-row {
      display: flex;
      padding: 8px;
      gap: 6px;
      border-top: 1px solid #2a2a2a;
      background: #1e1e1e;
    }

    #chat-input {
      flex: 1;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #111111;
      color: #e0e0e0;
      font-size: 0.85rem;
      outline: none;
    }

    #chat-send {
      padding: 7px 12px;
      background: #444;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.85rem;
    }

    #chat-send:hover { background: #555; }

    /* Click popups */
    .click-pop {
      position: fixed;
      pointer-events: none;
      font-size: 1.1rem;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 0 0 6px #44444488;
      animation: pop-up 0.8s ease-out forwards;
      z-index: 999;
    }

    @keyframes pop-up {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-50px) scale(1.4); }
    }
  </style>
</head>
<body>

<div id="join-screen">
  <div id="join-box">
    <h2>🍪 Cookie Chat</h2>
    <input id="name-input" type="text" placeholder="Enter your name..." maxlength="20" />
    <button id="join-btn">Join Game</button>
  </div>
</div>

<header>
  🍪 COOKIE CHAT &nbsp;|&nbsp;
  <input id="name-changer" type="text" maxlength="20" placeholder="Your name..." title="Press Enter to change name" />
  <button id="admin-btn" title="Admin Panel">🔑 Admin</button>
</header>

<!-- Admin Modal -->
<div id="admin-modal" style="display:none;position:fixed;inset:0;background:#000000bb;z-index:200;align-items:center;justify-content:center;">
  <div id="admin-box">
    <div id="admin-login-view">
      <h3>🔑 Admin Login</h3>
      <input id="admin-pass" type="password" placeholder="Password..." />
      <button id="admin-submit">Login</button>
      <div id="admin-error" style="color:#ff5555;font-size:0.8rem;margin-top:6px;"></div>
    </div>
    <div id="admin-panel-view" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3>🛡️ Admin Panel</h3>
        <button id="admin-clearchat-btn">🧹 Clear Chat</button>
      </div>
      <div id="admin-player-list"></div>
    </div>
    <button id="admin-close" style="margin-top:12px;width:100%;background:#333;color:#fff;border:none;padding:8px;border-radius:6px;cursor:pointer;">Close</button>
  </div>
</div>

<div id="main">
  <div id="game-panel">
    <div id="cookie-count">0 cookies</div>
    <div id="cps-display">0 cookies/sec</div>
    <button id="cookie-btn" title="Click me!">🍪</button>
    <div id="upgrades-title">Upgrades</div>
    <div id="upgrades"></div>
  </div>

  <div id="right-panel">
    <div id="leaderboard">
      <h3>🏆 Leaderboard</h3>
      <ul id="lb-list"></ul>
    </div>
    <div id="chat-section">
      <h3>💬 Chat</h3>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Say something..." maxlength="200" />
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ---- Game State ----
  let cookies = 0;
  let totalCps = 0;
  let myName = '';
  let socket;

  const UPGRADES = [
    { id: 'cursor',    name: '🖱️ Cursor',       desc: '+1 click power',     baseCost: 15,      clickPower: 1, cps: 0 },
    { id: 'grandma',   name: '👵 Grandma',       desc: '+1 cookie/sec',      baseCost: 100,     clickPower: 0, cps: 1 },
    { id: 'farm',      name: '🌾 Cookie Farm',   desc: '+5 cookies/sec',     baseCost: 500,     clickPower: 0, cps: 5 },
    { id: 'mine',      name: '⛏️ Mine',          desc: '+10 cookies/sec',    baseCost: 2000,    clickPower: 0, cps: 10 },
    { id: 'factory',   name: '🏭 Factory',       desc: '+20 cookies/sec',    baseCost: 8000,    clickPower: 0, cps: 20 },
    { id: 'bank',      name: '🏦 Cookie Bank',   desc: '+50 cookies/sec',    baseCost: 20000,   clickPower: 0, cps: 50 },
    { id: 'temple',    name: '⛩️ Temple',        desc: '+100 cookies/sec',   baseCost: 75000,   clickPower: 0, cps: 100 },
    { id: 'wizard',    name: '🧙 Wizard Tower',  desc: '+200 cookies/sec',   baseCost: 200000,  clickPower: 0, cps: 200 },
    { id: 'shipment',  name: '🚀 Shipment',      desc: '+500 cookies/sec',   baseCost: 500000,  clickPower: 0, cps: 500 },
    { id: 'alchemy',   name: '⚗️ Alchemy Lab',   desc: '+1K cookies/sec',    baseCost: 1500000, clickPower: 0, cps: 1000 },
    { id: 'portal',    name: '🌀 Portal',        desc: '+5K cookies/sec',    baseCost: 5000000, clickPower: 0, cps: 5000 },
    { id: 'timemachine',name: '⏰ Time Machine', desc: '+10K cookies/sec',   baseCost: 15000000,clickPower: 0, cps: 10000 },
    { id: 'megaclick', name: '👆 Mega Click',    desc: '+10 click power',    baseCost: 50000,   clickPower: 10, cps: 0 },
    { id: 'ultraclick',name: '⚡ Ultra Click',   desc: '+50 click power',    baseCost: 500000,  clickPower: 50, cps: 0 },
  ];

  const owned = {};
  UPGRADES.forEach(u => owned[u.id] = 0);

  function getCost(upg) {
    return Math.floor(upg.baseCost * Math.pow(1.15, owned[upg.id]));
  }

  function getClickPower() {
    return 1 + UPGRADES.filter(u => u.clickPower > 0).reduce((acc, u) => acc + u.clickPower * owned[u.id], 0);
  }

  function recalcCps() {
    totalCps = UPGRADES.filter(u => u.cps > 0).reduce((acc, u) => acc + u.cps * owned[u.id], 0);
  }

  function formatNum(n) {
    if (n >= 1e12) return (n / 1e12).toFixed(1) + 'T';
    if (n >= 1e9)  return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6)  return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3)  return (n / 1e3).toFixed(1) + 'K';
    return Math.floor(n).toString();
  }

  // ---- UI ----
  function renderUpgrades() {
    const container = document.getElementById('upgrades');
    container.innerHTML = '';
    UPGRADES.forEach(upg => {
      const cost = getCost(upg);
      const btn = document.createElement('button');
      btn.className = 'upgrade-btn';
      btn.disabled = cookies < cost;
      btn.innerHTML = `
        <div class="upg-name">${upg.name}</div>
        <div class="upg-desc">${upg.desc}</div>
        <div class="upg-cost">🍪 ${formatNum(cost)}</div>
        <div class="upg-owned">owned: ${owned[upg.id]}</div>
      `;
      btn.addEventListener('click', () => {
        if (cookies >= cost) {
          cookies -= cost;
          owned[upg.id]++;
          recalcCps();
          renderUpgrades();
          updateDisplay();
        }
      });
      container.appendChild(btn);
    });
  }

  function updateDisplay() {
    document.getElementById('cookie-count').textContent = formatNum(cookies) + ' cookies';
    document.getElementById('cps-display').textContent = formatNum(totalCps) + ' cookies/sec';
  }

  // ---- Cookie click ----
  document.getElementById('cookie-btn').addEventListener('click', (e) => {
    const power = getClickPower();
    cookies += power;
    updateDisplay();
    renderUpgrades();

    // Pop animation
    const pop = document.createElement('div');
    pop.className = 'click-pop';
    pop.textContent = '+' + formatNum(power);
    pop.style.left = (e.clientX - 15) + 'px';
    pop.style.top  = (e.clientY - 10) + 'px';
    document.body.appendChild(pop);
    setTimeout(() => pop.remove(), 800);
  });

  // ---- Game loop ----
  setInterval(() => {
    if (totalCps > 0) {
      cookies += totalCps / 20;
      updateDisplay();
      renderUpgrades();
    }
    if (socket && myName) {
      socket.emit('update_score', { cookies: Math.floor(cookies), cps: totalCps });
    }
  }, 50);

  // ---- Join ----
  function startGame(name) {
    myName = name;
    document.getElementById('join-screen').style.display = 'none';
    socket = io();

    socket.on('connect', () => {
      socket.emit('join', name);
      document.getElementById('name-changer').value = name;
    });

    socket.on('leaderboard', (lb) => {
      const list = document.getElementById('lb-list');
      list.innerHTML = '';
      lb.forEach((p, i) => {
        const li = document.createElement('li');
        if (p.name === myName) li.classList.add('me');
        li.innerHTML = `
          <span class="lb-name">${i + 1}. ${p.name}</span>
          <span class="lb-score">${formatNum(p.cookies)}</span>
        `;
        list.appendChild(li);
      });
    });

    socket.on('chat_cooldown', (secs) => {
      const input = document.getElementById('chat-input');
      input.placeholder = secs === 'muted' ? 'You are muted.' : `Wait ${secs}s...`;
      if (secs !== 'muted') setTimeout(() => { input.placeholder = 'Say something...'; }, secs * 1000);
    });

    socket.on('chat', ({ system, name, msg, time }) => {
      const msgs = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-msg' + (system ? ' system' : '');
      if (system) {
        div.textContent = msg;
      } else {
        div.innerHTML = `<span class="chat-name">${name}:</span> ${msg}`;
      }
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    });

    socket.on('chat_clear', () => {
      document.getElementById('chat-messages').innerHTML = '';
    });

    socket.on('admin_reset_you', () => {
      cookies = 0; totalCps = 0;
      Object.keys(owned).forEach(k => owned[k] = 0);
      recalcCps(); updateDisplay(); renderUpgrades();
    });

    socket.on('admin_result', ({ success }) => {
      if (success) {
        document.getElementById('admin-login-view').style.display = 'none';
        document.getElementById('admin-panel-view').style.display = 'block';
      } else {
        document.getElementById('admin-error').textContent = 'Wrong password.';
      }
    });

    socket.on('admin_playerlist', (list) => {
      const container = document.getElementById('admin-player-list');
      container.innerHTML = '';
      list.forEach(p => {
        const row = document.createElement('div');
        row.className = 'admin-player-row';
        row.innerHTML = `
          <span class="apname ${p.muted ? 'muted' : ''}">${p.name}</span>
          <span style="color:#888;font-size:0.75rem">${formatNum(p.cookies)} 🍪</span>
          ${p.muted
            ? `<button class="btn-unmute" onclick="socket.emit('admin_unmute','${p.name}')">Unmute</button>`
            : `<button class="btn-mute" onclick="socket.emit('admin_mute','${p.name}')">Mute</button>`}
          <button class="btn-reset" onclick="socket.emit('admin_reset','${p.name}')">Reset</button>
        `;
        container.appendChild(row);
      });
    });
  }

  // Name changer
  document.getElementById('name-changer').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const newName = e.target.value.trim();
      if (newName && socket) {
        myName = newName;
        socket.emit('join', newName);
        e.target.blur();
      }
    }
  });

  // ---- Admin ----
  document.getElementById('admin-btn').addEventListener('click', () => {
    const modal = document.getElementById('admin-modal');
    modal.style.display = 'flex';
  });
  document.getElementById('admin-close').addEventListener('click', () => {
    document.getElementById('admin-modal').style.display = 'none';
    document.getElementById('admin-error').textContent = '';
  });
  document.getElementById('admin-submit').addEventListener('click', () => {
    const pass = document.getElementById('admin-pass').value;
    if (socket) socket.emit('admin_login', pass);
  });
  document.getElementById('admin-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('admin-submit').click();
  });
  document.getElementById('admin-clearchat-btn').addEventListener('click', () => {
    if (socket) socket.emit('admin_clearchat');
  });

  // Auto-join with a random name
  const adjectives = ['Fast','Cool','Epic','Wild','Bold','Sly','Keen','Brave','Swift','Spicy'];
  const nouns = ['Cookie','Baker','Clicker','Muncher','Chomper','Crumble','Snacker','Nibbler'];
  const randomName = adjectives[Math.floor(Math.random()*adjectives.length)] + nouns[Math.floor(Math.random()*nouns.length)] + Math.floor(Math.random()*99);
  startGame(randomName);

  // ---- Chat send ----
  function sendChat() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (msg && socket) {
      socket.emit('chat_msg', msg);
      input.value = '';
    }
  }

  document.getElementById('chat-send').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendChat();
  });

  // ---- Init ----
  renderUpgrades();
  updateDisplay();
</script>
</body>
</html>
