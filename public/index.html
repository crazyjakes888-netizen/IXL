<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111111;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #1e1e1e;
      padding: 10px 20px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffffff;
      border-bottom: 2px solid #333;
      letter-spacing: 2px;
    }

    header { position: relative; }
    #admin-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #admin-btn:hover { background: #444; }

    /* Attacks */
    #attacks-title {
      font-size: 1rem; color: #aaaaaa;
      text-transform: uppercase; letter-spacing: 1px; margin-top: 8px;
    }
    #attack-target-row {
      display: flex; align-items: center; gap: 8px; width: 100%; max-width: 420px;
    }
    #attack-target {
      flex: 1; padding: 5px 8px; border-radius: 6px;
      border: 1px solid #333; background: #1e1e1e; color: #e0e0e0;
      font-size: 0.85rem; outline: none;
    }
    #attacks {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; width: 100%; max-width: 420px;
    }
    .attack-btn {
      background: #1e1e1e; border: 1px solid #552222;
      border-radius: 8px; padding: 10px 12px; cursor: pointer;
      color: #e0e0e0; text-align: left;
      transition: border-color 0.2s, background 0.2s;
    }
    .attack-btn:hover:not(:disabled) { border-color: #ff4444; background: #2a1515; }
    .attack-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .attack-btn .atk-name { font-weight: bold; font-size: 0.9rem; }
    .attack-btn .atk-desc { font-size: 0.75rem; color: #ff9999; margin-top: 2px; }
    .attack-btn .atk-cost { font-size: 0.8rem; color: #ffaaaa; margin-top: 4px; }

    /* Debuffs */
    #debuffs-display {
      display: flex; flex-wrap: wrap; gap: 6px;
      max-width: 420px; min-height: 0;
    }
    .debuff-chip {
      background: #2a1515; border: 1px solid #ff4444;
      border-radius: 20px; padding: 3px 10px;
      font-size: 0.75rem; color: #ff9999;
      animation: pulse-red 1s infinite alternate;
    }
    @keyframes pulse-red {
      from { border-color: #ff4444; }
      to   { border-color: #ff000088; }
    }

    /* Admin console */
    #admin-console {
      position: fixed;
      bottom: 40px;
      right: 20px;
      width: 420px;
      background: #0d0d0d;
      border: 1px solid #333;
      border-radius: 10px;
      z-index: 300;
      display: none;
      flex-direction: column;
      box-shadow: 0 8px 32px #000a;
      font-family: 'Consolas', 'Courier New', monospace;
    }
    #admin-console-titlebar {
      background: #1a1a1a;
      padding: 8px 14px;
      border-radius: 10px 10px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #333;
    }
    #admin-console-titlebar span { color: #aaa; font-size: 0.85rem; }
    #admin-console-close {
      background: none; border: none; color: #888; cursor: pointer;
      font-size: 1rem; line-height: 1;
    }
    #admin-console-close:hover { color: #fff; }
    #admin-login-bar {
      padding: 12px;
      display: flex;
      gap: 8px;
    }
    #admin-pass {
      flex: 1; padding: 7px 10px; border-radius: 6px;
      border: 1px solid #333; background: #111; color: #eee;
      font-size: 0.85rem; outline: none; font-family: inherit;
    }
    #admin-submit {
      padding: 7px 14px; background: #333; color: #fff;
      border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem;
    }
    #admin-submit:hover { background: #444; }
    #admin-output {
      height: 200px; overflow-y: auto; padding: 10px 14px;
      font-size: 0.8rem; line-height: 1.6; display: none;
    }
    #admin-output::-webkit-scrollbar { width: 4px; }
    #admin-output::-webkit-scrollbar-thumb { background: #333; }
    .alog-info  { color: #aaaaaa; }
    .alog-ok    { color: #44ff88; }
    .alog-err   { color: #ff5555; }
    .alog-warn  { color: #ffcc44; }
    #admin-cmd-bar {
      display: none;
      padding: 8px 14px;
      border-top: 1px solid #222;
      align-items: center;
      gap: 6px;
    }
    #admin-cmd-bar span { color: #555; font-size: 0.85rem; }
    #admin-cmd {
      flex: 1; background: none; border: none; color: #00ff88;
      font-size: 0.85rem; outline: none; font-family: inherit;
    }
    #admin-error { color: #ff5555; font-size: 0.8rem; padding: 0 14px 10px; display:none; }

    #name-changer {
      font-size: 0.9rem;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #e0e0e0;
      outline: none;
      width: 140px;
      vertical-align: middle;
    }

    #join-screen {
      position: fixed;
      inset: 0;
      background: #111111dd;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #join-box {
      background: #1e1e1e;
      border: 2px solid #444;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      min-width: 300px;
    }

    #join-box h2 { color: #ffffff; margin-bottom: 20px; font-size: 1.5rem; }

    #join-box input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #e0e0e0;
      font-size: 1rem;
      margin-bottom: 14px;
      outline: none;
    }

    #join-box button {
      width: 100%;
      padding: 12px;
      background: #444;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    #join-box button:hover { background: #555; }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* === GAME PANEL === */
    #game-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-y: auto;
      gap: 16px;
    }

    #cookie-count {
      font-size: 1.8rem;
      color: #ffffff;
      font-weight: bold;
      text-shadow: 0 0 10px #55555588;
    }

    #cps-display { color: #aaaaaa; font-size: 0.95rem; }

    #cookie-btn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 4px solid #555;
      background: radial-gradient(circle at 40% 35%, #c87820, #7a3b00);
      cursor: pointer;
      font-size: 4rem;
      user-select: none;
      transition: transform 0.08s, box-shadow 0.08s;
      box-shadow: 0 0 30px #33333355;
    }

    #cookie-btn:active {
      transform: scale(0.93);
      box-shadow: 0 0 10px #22222244;
    }

    #upgrades-title {
      font-size: 1rem;
      color: #aaaaaa;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #upgrades {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 420px;
    }

    .upgrade-btn {
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      color: #e0e0e0;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
    }

    .upgrade-btn:hover:not(:disabled) {
      border-color: #666;
      background: #2a2a2a;
    }

    .upgrade-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .upgrade-btn .upg-name { font-weight: bold; font-size: 0.9rem; }
    .upgrade-btn .upg-desc { font-size: 0.75rem; color: #aaaaaa; margin-top: 2px; }
    .upgrade-btn .upg-cost { font-size: 0.8rem; color: #ffffff; margin-top: 4px; }
    .upgrade-btn .upg-owned { font-size: 0.7rem; color: #aaaaaa; }

    /* === RIGHT PANEL === */
    #right-panel {
      width: 280px;
      display: flex;
      flex-direction: column;
      border-left: 2px solid #2a2a2a;
      overflow: hidden;
    }

    /* Leaderboard */
    #leaderboard {
      background: #181818;
      padding: 12px;
      border-bottom: 2px solid #2a2a2a;
    }

    #leaderboard h3 {
      color: #ffffff;
      font-size: 0.9rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #lb-list { list-style: none; }
    #lb-list li {
      font-size: 0.8rem;
      padding: 3px 0;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #2a2a2a55;
    }

    #lb-list li .lb-name { color: #e0e0e0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
    #lb-list li .lb-score { color: #ffffff; white-space: nowrap; }
    #lb-list li.me .lb-name { color: #ffffff; font-weight: bold; }

    /* Chat */
    #chat-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-section h3 {
      padding: 10px 12px;
      font-size: 0.9rem;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: #1e1e1e;
      border-bottom: 1px solid #2a2a2a;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }

    .chat-msg { font-size: 0.82rem; line-height: 1.4; word-break: break-word; }
    .chat-msg .chat-name { color: #aaaaff; font-weight: bold; }
    .chat-msg.system { color: #888888; font-style: italic; }

    #chat-input-row {
      display: flex;
      padding: 8px;
      gap: 6px;
      border-top: 1px solid #2a2a2a;
      background: #1e1e1e;
    }

    #chat-input {
      flex: 1;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #111111;
      color: #e0e0e0;
      font-size: 0.85rem;
      outline: none;
    }

    #chat-send {
      padding: 7px 12px;
      background: #444;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.85rem;
    }

    #chat-send:hover { background: #555; }

    /* Click popups */
    .click-pop {
      position: fixed;
      pointer-events: none;
      font-size: 1.1rem;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 0 0 6px #44444488;
      animation: pop-up 0.8s ease-out forwards;
      z-index: 999;
    }

    @keyframes pop-up {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-50px) scale(1.4); }
    }
  </style>
</head>
<body>

<div id="join-screen">
  <div id="join-box">
    <h2>🍪 Cookie Chat</h2>
    <input id="name-input" type="text" placeholder="Enter your name..." maxlength="20" />
    <button id="join-btn">Join Game</button>
  </div>
</div>

<header>
  🍪 COOKIE CHAT &nbsp;|&nbsp;
  <input id="name-changer" type="text" maxlength="20" placeholder="Your name..." title="Press Enter to change name" />
  <button id="admin-btn" title="Admin Panel">🔑 Admin</button>
</header>

<!-- Admin Console -->
<div id="admin-console">
  <div id="admin-console-titlebar">
    <span>🛡️ Admin Console</span>
    <button id="admin-console-close">✕</button>
  </div>
  <div id="admin-login-bar">
    <input id="admin-pass" type="password" placeholder="Enter password..." />
    <button id="admin-submit">Login</button>
  </div>
  <div id="admin-error"></div>
  <div id="admin-output"></div>
  <div id="admin-cmd-bar">
    <span>&gt;</span>
    <input id="admin-cmd" type="text" placeholder="type a command..." autocomplete="off" spellcheck="false" />
  </div>
</div>

<div id="main">
  <div id="game-panel">
    <div id="cookie-count">0 cookies</div>
    <div id="cps-display">0 cookies/sec</div>
    <button id="cookie-btn" title="Click me!">🍪</button>
    <div id="upgrades-title">Upgrades</div>
    <div id="upgrades"></div>
    <div id="debuffs-display"></div>
    <div id="attacks-title">⚔️ Attacks</div>
    <div id="attack-target-row">
      <span style="color:#aaa;font-size:0.8rem;">Target:</span>
      <select id="attack-target"><option value="">— pick player —</option></select>
    </div>
    <div id="attacks"></div>
  </div>

  <div id="right-panel">
    <div id="leaderboard">
      <h3>🏆 Leaderboard</h3>
      <ul id="lb-list"></ul>
    </div>
    <div id="chat-section">
      <h3>💬 Chat</h3>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Say something..." maxlength="200" />
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ---- Game State ----
  let cookies = 0;
  let totalCps = 0;
  let myName = '';
  let socket;

  const UPGRADES = [
    { id: 'cursor',    name: '🖱️ Cursor',       desc: '+1 click power',     baseCost: 15,      clickPower: 1, cps: 0 },
    { id: 'grandma',   name: '👵 Grandma',       desc: '+1 cookie/sec',      baseCost: 100,     clickPower: 0, cps: 1 },
    { id: 'farm',      name: '🌾 Cookie Farm',   desc: '+5 cookies/sec',     baseCost: 500,     clickPower: 0, cps: 5 },
    { id: 'mine',      name: '⛏️ Mine',          desc: '+10 cookies/sec',    baseCost: 2000,    clickPower: 0, cps: 10 },
    { id: 'factory',   name: '🏭 Factory',       desc: '+20 cookies/sec',    baseCost: 8000,    clickPower: 0, cps: 20 },
    { id: 'bank',      name: '🏦 Cookie Bank',   desc: '+50 cookies/sec',    baseCost: 20000,   clickPower: 0, cps: 50 },
    { id: 'temple',    name: '⛩️ Temple',        desc: '+100 cookies/sec',   baseCost: 75000,   clickPower: 0, cps: 100 },
    { id: 'wizard',    name: '🧙 Wizard Tower',  desc: '+200 cookies/sec',   baseCost: 200000,  clickPower: 0, cps: 200 },
    { id: 'shipment',  name: '🚀 Shipment',      desc: '+500 cookies/sec',   baseCost: 500000,  clickPower: 0, cps: 500 },
    { id: 'alchemy',   name: '⚗️ Alchemy Lab',   desc: '+1K cookies/sec',    baseCost: 1500000, clickPower: 0, cps: 1000 },
    { id: 'portal',    name: '🌀 Portal',        desc: '+5K cookies/sec',    baseCost: 5000000, clickPower: 0, cps: 5000 },
    { id: 'timemachine',name: '⏰ Time Machine', desc: '+10K cookies/sec',   baseCost: 15000000,clickPower: 0, cps: 10000 },
    { id: 'megaclick', name: '👆 Mega Click',    desc: '+10 click power',    baseCost: 50000,   clickPower: 10, cps: 0 },
    { id: 'ultraclick',name: '⚡ Ultra Click',   desc: '+50 click power',    baseCost: 500000,  clickPower: 50, cps: 0 },
  ];

  const ATTACKS = [
    { id: 'snatch',    name: '🤏 Cookie Snatch', desc: 'Steal 10% of their cookies', cost: 500,     effect: 'snatch'  },
    { id: 'freeze',    name: '❄️ Freeze',         desc: 'Stop their CPS for 12s',     cost: 2000,    effect: 'freeze'  },
    { id: 'bomb',      name: '💣 Cookie Bomb',    desc: 'Destroy 25% of their cookies',cost: 6000,   effect: 'bomb'    },
    { id: 'curse',     name: '☠️ Curse',          desc: 'Drain -20/sec for 20s',       cost: 15000,  effect: 'curse'   },
    { id: 'blackhole', name: '🌑 Black Hole',     desc: 'Steal 50% of their cookies',  cost: 75000,  effect: 'blackhole'},
    { id: 'timetheft', name: '⏳ Time Theft',     desc: 'Rewind their CPS for 30s',    cost: 200000, effect: 'timetheft'},
  ];

  const activeDebuffs = {}; // { type: clearTimeout }

  const owned = {};
  UPGRADES.forEach(u => owned[u.id] = 0);

  function getCost(upg) {
    return Math.floor(upg.baseCost * Math.pow(1.15, owned[upg.id]));
  }

  function getClickPower() {
    return 1 + UPGRADES.filter(u => u.clickPower > 0).reduce((acc, u) => acc + u.clickPower * owned[u.id], 0);
  }

  function recalcCps() {
    totalCps = UPGRADES.filter(u => u.cps > 0).reduce((acc, u) => acc + u.cps * owned[u.id], 0);
  }

  function formatNum(n) {
    if (n >= 1e12) return (n / 1e12).toFixed(1) + 'T';
    if (n >= 1e9)  return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6)  return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3)  return (n / 1e3).toFixed(1) + 'K';
    return Math.floor(n).toString();
  }

  // ---- UI ----
  function renderUpgrades() {
    const container = document.getElementById('upgrades');
    container.innerHTML = '';
    UPGRADES.forEach(upg => {
      const cost = getCost(upg);
      const btn = document.createElement('button');
      btn.className = 'upgrade-btn';
      btn.disabled = cookies < cost;
      btn.innerHTML = `
        <div class="upg-name">${upg.name}</div>
        <div class="upg-desc">${upg.desc}</div>
        <div class="upg-cost">🍪 ${formatNum(cost)}</div>
        <div class="upg-owned">owned: ${owned[upg.id]}</div>
      `;
      btn.addEventListener('click', () => {
        if (cookies >= cost) {
          cookies -= cost;
          owned[upg.id]++;
          recalcCps();
          renderUpgrades();
          updateDisplay();
        }
      });
      container.appendChild(btn);
    });
  }

  function renderAttacks() {
    const container = document.getElementById('attacks');
    container.innerHTML = '';
    ATTACKS.forEach(atk => {
      const btn = document.createElement('button');
      btn.className = 'attack-btn';
      btn.disabled = cookies < atk.cost;
      btn.innerHTML = `
        <div class="atk-name">${atk.name}</div>
        <div class="atk-desc">${atk.desc}</div>
        <div class="atk-cost">🍪 ${formatNum(atk.cost)}</div>
      `;
      btn.addEventListener('click', () => {
        const target = document.getElementById('attack-target').value;
        if (!target) { alert('Pick a target first!'); return; }
        if (target === myName) { alert("You can't attack yourself!"); return; }
        if (cookies >= atk.cost && socket) {
          cookies -= atk.cost;
          socket.emit('attack', { attackId: atk.id, targetName: target });
          updateDisplay();
          renderAttacks();
        }
      });
      container.appendChild(btn);
    });
  }

  function updateTargetList(players) {
    const sel = document.getElementById('attack-target');
    const current = sel.value;
    sel.innerHTML = '<option value="">— pick player —</option>';
    players.forEach(p => {
      if (p.name !== myName) {
        const opt = document.createElement('option');
        opt.value = p.name;
        opt.textContent = p.name;
        if (p.name === current) opt.selected = true;
        sel.appendChild(opt);
      }
    });
  }

  function applyDebuff(type, duration, label) {
    if (activeDebuffs[type]) clearTimeout(activeDebuffs[type].timer);
    const display = document.getElementById('debuffs-display');
    let chip = document.getElementById('debuff-' + type);
    if (!chip) {
      chip = document.createElement('div');
      chip.className = 'debuff-chip';
      chip.id = 'debuff-' + type;
      display.appendChild(chip);
    }
    chip.textContent = label;
    activeDebuffs[type] = {
      timer: setTimeout(() => {
        chip.remove();
        delete activeDebuffs[type];
      }, duration)
    };
  }

  function updateDisplay() {
    document.getElementById('cookie-count').textContent = formatNum(cookies) + ' cookies';
    document.getElementById('cps-display').textContent = formatNum(totalCps) + ' cookies/sec';
  }

  // ---- Cookie click ----
  document.getElementById('cookie-btn').addEventListener('click', (e) => {
    const power = getClickPower();
    cookies += power;
    updateDisplay();
    renderUpgrades();

    // Pop animation
    const pop = document.createElement('div');
    pop.className = 'click-pop';
    pop.textContent = '+' + formatNum(power);
    pop.style.left = (e.clientX - 15) + 'px';
    pop.style.top  = (e.clientY - 10) + 'px';
    document.body.appendChild(pop);
    setTimeout(() => pop.remove(), 800);
  });

  // ---- Game loop ----
  let drainAmount = 0; // active curse drain per tick
  setInterval(() => {
    let gained = totalCps / 20;
    if (drainAmount > 0) gained -= drainAmount / 20;
    if (gained !== 0) {
      cookies = Math.max(0, cookies + gained);
      updateDisplay();
      renderUpgrades();
      renderAttacks();
    } else if (totalCps > 0) {
      updateDisplay();
      renderUpgrades();
      renderAttacks();
    }
    if (socket && myName) {
      socket.emit('update_score', { cookies: Math.floor(cookies), cps: totalCps });
    }
  }, 50);

  // ---- Join ----
  function startGame(name) {
    myName = name;
    document.getElementById('join-screen').style.display = 'none';
    socket = io();

    socket.on('connect', () => {
      socket.emit('join', name);
      document.getElementById('name-changer').value = name;
    });

    socket.on('leaderboard', (lb) => {
      const list = document.getElementById('lb-list');
      list.innerHTML = '';
      lb.forEach((p, i) => {
        const li = document.createElement('li');
        if (p.name === myName) li.classList.add('me');
        li.innerHTML = `
          <span class="lb-name">${i + 1}. ${p.name}</span>
          <span class="lb-score">${formatNum(p.cookies)}</span>
        `;
        list.appendChild(li);
      });
      updateTargetList(lb);
    });

    socket.on('chat_cooldown', (secs) => {
      const input = document.getElementById('chat-input');
      input.placeholder = secs === 'muted' ? 'You are muted.' : `Wait ${secs}s...`;
      if (secs !== 'muted') setTimeout(() => { input.placeholder = 'Say something...'; }, secs * 1000);
    });

    socket.on('chat', ({ system, name, msg, time }) => {
      const msgs = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-msg' + (system ? ' system' : '');
      if (system) {
        div.textContent = msg;
      } else {
        div.innerHTML = `<span class="chat-name">${name}:</span> ${msg}`;
      }
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    });

    socket.on('chat_clear', () => {
      document.getElementById('chat-messages').innerHTML = '';
    });

    socket.on('banned', (info) => {
      document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#111;color:#ff5555;font-family:monospace;font-size:1.2rem;flex-direction:column;gap:12px;">
        <div style="font-size:3rem">🔨</div>
        <div>You have been banned.</div>
        <div style="color:#888;font-size:0.9rem">${info === 'permanent' ? 'This ban is permanent.' : 'Duration: ' + info}</div>
      </div>`;
    });

    // Attack received
    socket.on('attack_hit', ({ attackId, attackerName }) => {
      const DURATION = { freeze: 12000, curse: 20000, timetheft: 30000 };
      if (attackId === 'snatch') {
        const lost = Math.floor(cookies * 0.10);
        cookies = Math.max(0, cookies - lost);
        applyDebuff('snatch', 3000, `🤏 Snatched! -${formatNum(lost)}`);
      } else if (attackId === 'bomb') {
        const lost = Math.floor(cookies * 0.25);
        cookies = Math.max(0, cookies - lost);
        applyDebuff('bomb', 3000, `💣 Bombed! -${formatNum(lost)}`);
      } else if (attackId === 'blackhole') {
        const lost = Math.floor(cookies * 0.50);
        cookies = Math.max(0, cookies - lost);
        applyDebuff('blackhole', 3000, `🌑 Black Hole! -${formatNum(lost)}`);
      } else if (attackId === 'freeze') {
        const prev = totalCps;
        totalCps = 0;
        applyDebuff('freeze', DURATION.freeze, '❄️ Frozen! CPS=0');
        setTimeout(() => { totalCps = prev; }, DURATION.freeze);
      } else if (attackId === 'curse') {
        drainAmount = 20;
        applyDebuff('curse', DURATION.curse, '☠️ Cursed! -20/sec');
        setTimeout(() => { drainAmount = 0; }, DURATION.curse);
      } else if (attackId === 'timetheft') {
        const prev = totalCps;
        totalCps = -prev;
        applyDebuff('timetheft', DURATION.timetheft, '⏳ Time Theft! CPS reversed');
        setTimeout(() => { totalCps = prev; }, DURATION.timetheft);
      }
      updateDisplay();
      // Show in chat
      const msgs = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-msg system';
      div.textContent = `⚔️ ${attackerName} attacked you with ${attackId}!`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    });

    socket.on('admin_reset_you', () => {
      cookies = 0; totalCps = 0;
      Object.keys(owned).forEach(k => owned[k] = 0);
      recalcCps(); updateDisplay(); renderUpgrades();
    });

    socket.on('admin_result', ({ success }) => {
      if (success) {
        document.getElementById('admin-login-bar').style.display = 'none';
        document.getElementById('admin-output').style.display = 'block';
        document.getElementById('admin-cmd-bar').style.display = 'flex';
        adminLog('Logged in. Type /help for commands.', 'alog-ok');
      } else {
        const err = document.getElementById('admin-error');
        err.style.display = 'block';
        err.textContent = 'Wrong password.';
      }
    });

    socket.on('admin_action_result', ({ ok, msg }) => {
      adminLog(msg, ok ? 'alog-ok' : 'alog-err');
    });

    socket.on('admin_playerlist', () => {});
  }

  // Name changer
  document.getElementById('name-changer').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const newName = e.target.value.trim();
      if (newName && socket) {
        myName = newName;
        socket.emit('join', newName);
        e.target.blur();
      }
    }
  });

  // ---- Admin ----
  // ---- Admin Console ----
  function adminLog(msg, cls = 'alog-info') {
    const out = document.getElementById('admin-output');
    const line = document.createElement('div');
    line.className = cls;
    line.textContent = msg;
    out.appendChild(line);
    out.scrollTop = out.scrollHeight;
  }

  document.getElementById('admin-btn').addEventListener('click', () => {
    const c = document.getElementById('admin-console');
    c.style.display = c.style.display === 'flex' ? 'none' : 'flex';
  });

  document.getElementById('admin-console-close').addEventListener('click', () => {
    document.getElementById('admin-console').style.display = 'none';
  });

  document.getElementById('admin-submit').addEventListener('click', () => {
    const pass = document.getElementById('admin-pass').value;
    if (socket) socket.emit('admin_login', pass);
  });

  document.getElementById('admin-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('admin-submit').click();
  });

  const cmdHistory = [];
  let cmdHistoryIdx = -1;
  document.getElementById('admin-cmd').addEventListener('keydown', e => {
    if (e.key === 'ArrowUp') {
      if (cmdHistoryIdx < cmdHistory.length - 1) cmdHistoryIdx++;
      e.target.value = cmdHistory[cmdHistoryIdx] || '';
      return;
    }
    if (e.key === 'ArrowDown') {
      if (cmdHistoryIdx > 0) cmdHistoryIdx--;
      e.target.value = cmdHistory[cmdHistoryIdx] || '';
      return;
    }
    if (e.key !== 'Enter') return;
    const raw = e.target.value.trim();
    if (!raw) return;
    cmdHistory.unshift(raw); cmdHistoryIdx = -1;
    adminLog('> ' + raw, 'alog-info');
    e.target.value = '';

    const parts = raw.split(/\s+/);
    const cmd = parts[0].toLowerCase();

    if (cmd === '/help') {
      adminLog('/mute (name)', 'alog-warn');
      adminLog('/unmute (name)', 'alog-warn');
      adminLog('/clear', 'alog-warn');
      adminLog('/timeout (name) (seconds)', 'alog-warn');
      adminLog('/ban (name) (seconds|perm)', 'alog-warn');
      return;
    }
    if (!socket) { adminLog('Not connected.', 'alog-err'); return; }

    if (cmd === '/mute') {
      if (!parts[1]) { adminLog('Usage: /mute (name)', 'alog-err'); return; }
      socket.emit('admin_mute', parts[1]);
    } else if (cmd === '/unmute') {
      if (!parts[1]) { adminLog('Usage: /unmute (name)', 'alog-err'); return; }
      socket.emit('admin_unmute', parts[1]);
    } else if (cmd === '/clear') {
      socket.emit('admin_clearchat');
    } else if (cmd === '/timeout') {
      if (!parts[1] || !parts[2]) { adminLog('Usage: /timeout (name) (seconds)', 'alog-err'); return; }
      socket.emit('admin_timeout', { name: parts[1], seconds: parseInt(parts[2]) });
    } else if (cmd === '/ban') {
      if (!parts[1] || !parts[2]) { adminLog('Usage: /ban (name) (seconds|perm)', 'alog-err'); return; }
      socket.emit('admin_ban', { name: parts[1], duration: parts[2] === 'perm' ? 'perm' : parseInt(parts[2]) });
    } else {
      adminLog('Unknown command. Type /help', 'alog-err');
    }
  });

  // Auto-join with a random name
  const adjectives = ['Fast','Cool','Epic','Wild','Bold','Sly','Keen','Brave','Swift','Spicy'];
  const nouns = ['Cookie','Baker','Clicker','Muncher','Chomper','Crumble','Snacker','Nibbler'];
  const randomName = adjectives[Math.floor(Math.random()*adjectives.length)] + nouns[Math.floor(Math.random()*nouns.length)] + Math.floor(Math.random()*99);
  startGame(randomName);

  // ---- Chat send ----
  function sendChat() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (msg && socket) {
      socket.emit('chat_msg', msg);
      input.value = '';
    }
  }

  document.getElementById('chat-send').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendChat();
  });

  // ---- Init ----
  renderUpgrades();
  renderAttacks();
  updateDisplay();
</script>
</body>
</html>
