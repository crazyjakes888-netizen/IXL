<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cookie Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a0a00;
      color: #f5deb3;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #3d1a00;
      padding: 10px 20px;
      text-align: center;
      font-size: 1.4rem;
      font-weight: bold;
      color: #ffcc66;
      border-bottom: 2px solid #7a3b00;
      letter-spacing: 2px;
    }

    #join-screen {
      position: fixed;
      inset: 0;
      background: #1a0a00dd;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #join-box {
      background: #3d1a00;
      border: 2px solid #c87820;
      border-radius: 12px;
      padding: 40px;
      text-align: center;
      min-width: 300px;
    }

    #join-box h2 { color: #ffcc66; margin-bottom: 20px; font-size: 1.5rem; }

    #join-box input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #c87820;
      background: #2a0e00;
      color: #f5deb3;
      font-size: 1rem;
      margin-bottom: 14px;
      outline: none;
    }

    #join-box button {
      width: 100%;
      padding: 12px;
      background: #c87820;
      color: #1a0a00;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    #join-box button:hover { background: #ffaa33; }

    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* === GAME PANEL === */
    #game-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-y: auto;
      gap: 16px;
    }

    #cookie-count {
      font-size: 1.8rem;
      color: #ffcc66;
      font-weight: bold;
      text-shadow: 0 0 10px #c87820;
    }

    #cps-display { color: #c8a060; font-size: 0.95rem; }

    #cookie-btn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 4px solid #c87820;
      background: radial-gradient(circle at 40% 35%, #c87820, #7a3b00);
      cursor: pointer;
      font-size: 4rem;
      user-select: none;
      transition: transform 0.08s, box-shadow 0.08s;
      box-shadow: 0 0 30px #c8782055;
    }

    #cookie-btn:active {
      transform: scale(0.93);
      box-shadow: 0 0 10px #c8782044;
    }

    #upgrades-title {
      font-size: 1rem;
      color: #c8a060;
      align-self: flex-start;
      margin-left: 10px;
    }

    #upgrades {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 420px;
    }

    .upgrade-btn {
      background: #3d1a00;
      border: 1px solid #7a3b00;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      color: #f5deb3;
      text-align: left;
      transition: border-color 0.2s, background 0.2s;
    }

    .upgrade-btn:hover:not(:disabled) {
      border-color: #c87820;
      background: #4d2200;
    }

    .upgrade-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .upgrade-btn .upg-name { font-weight: bold; font-size: 0.9rem; }
    .upgrade-btn .upg-desc { font-size: 0.75rem; color: #c8a060; margin-top: 2px; }
    .upgrade-btn .upg-cost { font-size: 0.8rem; color: #ffcc66; margin-top: 4px; }
    .upgrade-btn .upg-owned { font-size: 0.7rem; color: #c8a060; }

    /* === RIGHT PANEL === */
    #right-panel {
      width: 280px;
      display: flex;
      flex-direction: column;
      border-left: 2px solid #3d1a00;
      overflow: hidden;
    }

    /* Leaderboard */
    #leaderboard {
      background: #250d00;
      padding: 12px;
      border-bottom: 2px solid #3d1a00;
    }

    #leaderboard h3 {
      color: #ffcc66;
      font-size: 0.9rem;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #lb-list { list-style: none; }
    #lb-list li {
      font-size: 0.8rem;
      padding: 3px 0;
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid #3d1a0055;
    }

    #lb-list li .lb-name { color: #f5deb3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 140px; }
    #lb-list li .lb-score { color: #ffcc66; white-space: nowrap; }
    #lb-list li.me .lb-name { color: #ffcc66; font-weight: bold; }

    /* Chat */
    #chat-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-section h3 {
      padding: 10px 12px;
      font-size: 0.9rem;
      color: #ffcc66;
      text-transform: uppercase;
      letter-spacing: 1px;
      background: #2a0e00;
      border-bottom: 1px solid #3d1a00;
    }

    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-thumb { background: #7a3b00; border-radius: 4px; }

    .chat-msg { font-size: 0.82rem; line-height: 1.4; word-break: break-word; }
    .chat-msg .chat-name { color: #ffaa33; font-weight: bold; }
    .chat-msg.system { color: #c8a060; font-style: italic; }

    #chat-input-row {
      display: flex;
      padding: 8px;
      gap: 6px;
      border-top: 1px solid #3d1a00;
      background: #2a0e00;
    }

    #chat-input {
      flex: 1;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid #7a3b00;
      background: #1a0a00;
      color: #f5deb3;
      font-size: 0.85rem;
      outline: none;
    }

    #chat-send {
      padding: 7px 12px;
      background: #c87820;
      color: #1a0a00;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 0.85rem;
    }

    #chat-send:hover { background: #ffaa33; }

    /* Click popups */
    .click-pop {
      position: fixed;
      pointer-events: none;
      font-size: 1.1rem;
      font-weight: bold;
      color: #ffcc66;
      text-shadow: 0 0 6px #c87820;
      animation: pop-up 0.8s ease-out forwards;
      z-index: 999;
    }

    @keyframes pop-up {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-50px) scale(1.4); }
    }
  </style>
</head>
<body>

<div id="join-screen">
  <div id="join-box">
    <h2>🍪 Cookie Chat</h2>
    <input id="name-input" type="text" placeholder="Enter your name..." maxlength="20" />
    <button id="join-btn">Join Game</button>
  </div>
</div>

<header>🍪 COOKIE CHAT</header>

<div id="main">
  <div id="game-panel">
    <div id="cookie-count">0 cookies</div>
    <div id="cps-display">0 cookies/sec</div>
    <button id="cookie-btn" title="Click me!">🍪</button>
    <div id="upgrades-title">Upgrades</div>
    <div id="upgrades"></div>
  </div>

  <div id="right-panel">
    <div id="leaderboard">
      <h3>🏆 Leaderboard</h3>
      <ul id="lb-list"></ul>
    </div>
    <div id="chat-section">
      <h3>💬 Chat</h3>
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Say something..." maxlength="200" />
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  // ---- Game State ----
  let cookies = 0;
  let totalCps = 0;
  let myName = '';
  let socket;

  const UPGRADES = [
    { id: 'cursor',   name: 'Cursor',      desc: '+1 click power',   baseCost: 15,   clickPower: 1, cps: 0 },
    { id: 'grandma',  name: 'Grandma',     desc: '+1 cookie/sec',    baseCost: 100,  clickPower: 0, cps: 1 },
    { id: 'farm',     name: 'Cookie Farm', desc: '+5 cookies/sec',   baseCost: 500,  clickPower: 0, cps: 5 },
    { id: 'factory',  name: 'Factory',     desc: '+20 cookies/sec',  baseCost: 2000, clickPower: 0, cps: 20 },
    { id: 'mine',     name: 'Mine',        desc: '+50 cookies/sec',  baseCost: 8000, clickPower: 0, cps: 50 },
    { id: 'shipment', name: 'Shipment',    desc: '+100/sec',         baseCost: 25000,clickPower: 0, cps: 100 },
  ];

  const owned = {};
  UPGRADES.forEach(u => owned[u.id] = 0);

  function getCost(upg) {
    return Math.floor(upg.baseCost * Math.pow(1.15, owned[upg.id]));
  }

  function getClickPower() {
    return 1 + UPGRADES.filter(u => u.clickPower > 0).reduce((acc, u) => acc + u.clickPower * owned[u.id], 0);
  }

  function recalcCps() {
    totalCps = UPGRADES.filter(u => u.cps > 0).reduce((acc, u) => acc + u.cps * owned[u.id], 0);
  }

  function formatNum(n) {
    if (n >= 1e12) return (n / 1e12).toFixed(1) + 'T';
    if (n >= 1e9)  return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6)  return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3)  return (n / 1e3).toFixed(1) + 'K';
    return Math.floor(n).toString();
  }

  // ---- UI ----
  function renderUpgrades() {
    const container = document.getElementById('upgrades');
    container.innerHTML = '';
    UPGRADES.forEach(upg => {
      const cost = getCost(upg);
      const btn = document.createElement('button');
      btn.className = 'upgrade-btn';
      btn.disabled = cookies < cost;
      btn.innerHTML = `
        <div class="upg-name">${upg.name}</div>
        <div class="upg-desc">${upg.desc}</div>
        <div class="upg-cost">🍪 ${formatNum(cost)}</div>
        <div class="upg-owned">owned: ${owned[upg.id]}</div>
      `;
      btn.addEventListener('click', () => {
        if (cookies >= cost) {
          cookies -= cost;
          owned[upg.id]++;
          recalcCps();
          renderUpgrades();
          updateDisplay();
        }
      });
      container.appendChild(btn);
    });
  }

  function updateDisplay() {
    document.getElementById('cookie-count').textContent = formatNum(cookies) + ' cookies';
    document.getElementById('cps-display').textContent = formatNum(totalCps) + ' cookies/sec';
  }

  // ---- Cookie click ----
  document.getElementById('cookie-btn').addEventListener('click', (e) => {
    const power = getClickPower();
    cookies += power;
    updateDisplay();
    renderUpgrades();

    // Pop animation
    const pop = document.createElement('div');
    pop.className = 'click-pop';
    pop.textContent = '+' + formatNum(power);
    pop.style.left = (e.clientX - 15) + 'px';
    pop.style.top  = (e.clientY - 10) + 'px';
    document.body.appendChild(pop);
    setTimeout(() => pop.remove(), 800);
  });

  // ---- Game loop ----
  setInterval(() => {
    if (totalCps > 0) {
      cookies += totalCps / 20;
      updateDisplay();
      renderUpgrades();
    }
    if (socket && myName) {
      socket.emit('update_score', { cookies: Math.floor(cookies), cps: totalCps });
    }
  }, 50);

  // ---- Join ----
  function startGame(name) {
    myName = name;
    document.getElementById('join-screen').style.display = 'none';
    socket = io();

    socket.on('connect', () => {
      socket.emit('join', name);
    });

    socket.on('leaderboard', (lb) => {
      const list = document.getElementById('lb-list');
      list.innerHTML = '';
      lb.forEach((p, i) => {
        const li = document.createElement('li');
        if (p.name === myName) li.classList.add('me');
        li.innerHTML = `
          <span class="lb-name">${i + 1}. ${p.name}</span>
          <span class="lb-score">${formatNum(p.cookies)}</span>
        `;
        list.appendChild(li);
      });
    });

    socket.on('chat', ({ system, name, msg, time }) => {
      const msgs = document.getElementById('chat-messages');
      const div = document.createElement('div');
      div.className = 'chat-msg' + (system ? ' system' : '');
      if (system) {
        div.textContent = msg;
      } else {
        div.innerHTML = `<span class="chat-name">${name}:</span> ${msg}`;
      }
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    });
  }

  // Auto-join with a random name
  const adjectives = ['Fast','Cool','Epic','Wild','Bold','Sly','Keen','Brave','Swift','Spicy'];
  const nouns = ['Cookie','Baker','Clicker','Muncher','Chomper','Crumble','Snacker','Nibbler'];
  const randomName = adjectives[Math.floor(Math.random()*adjectives.length)] + nouns[Math.floor(Math.random()*nouns.length)] + Math.floor(Math.random()*99);
  startGame(randomName);

  // ---- Chat send ----
  function sendChat() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (msg && socket) {
      socket.emit('chat_msg', msg);
      input.value = '';
    }
  }

  document.getElementById('chat-send').addEventListener('click', sendChat);
  document.getElementById('chat-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendChat();
  });

  // ---- Init ----
  renderUpgrades();
  updateDisplay();
</script>
</body>
</html>
